<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe照 月間出勤表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#fff;color:#1e1810;padding:12px;}
.bar{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f5f0e8;border-radius:10px;margin-bottom:14px;flex-wrap:wrap;}
.pbtn{background:#3a8a5a;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:.95rem;font-family:inherit;cursor:pointer;font-weight:700;}
.bbtn{background:#fff;color:#1e1810;border:1px solid #ddd0b8;border-radius:8px;padding:10px 14px;font-size:.82rem;font-family:inherit;cursor:pointer;}
.rbtn{background:#fff;color:#2860a8;border:1px solid #2860a8;border-radius:8px;padding:10px 14px;font-size:.82rem;font-family:inherit;cursor:pointer;}
.info{font-size:.68rem;color:#8a7a60;flex:1;min-width:120px;}
.banner{background:#e8f4ff;border:1px solid #a0c8f0;border-radius:8px;padding:10px 14px;font-size:.72rem;color:#2860a8;margin-bottom:12px;display:none;}
h2{font-size:1.05rem;color:#b8622a;margin-bottom:10px;font-weight:700;}
table{border-collapse:collapse;width:100%;font-size:.7rem;}
th,td{border:1px solid #ddd0b8;padding:3px;text-align:center;}
th{background:#f5f0e8;font-weight:600;}
.nodata{text-align:center;padding:50px 20px;color:#8a7a60;font-size:.85rem;line-height:2.2;background:#f9f6f0;border-radius:10px;}
.loading{text-align:center;padding:40px;color:#8a7a60;}
@media print{
  .bar,.banner{display:none!important;}
  body{padding:4px;font-size:8.5pt;}
  h2{font-size:11pt;}
  table{font-size:7pt;}
  th,td{padding:2px;}
  @page{size:A4 landscape;margin:8mm;}
}
</style>
</head>
<body>
<div class="bar">
  <button class="pbtn" onclick="window.print()">🖨 印刷 / PDF保存</button>
  <button class="bbtn" onclick="goBack()">← 戻る</button>
  <button class="rbtn" onclick="loadData(true)">🔄 最新に更新</button>
  <div class="info" id="info">読み込み中...</div>
</div>
<div class="banner" id="banner">📅 Cafe照のシフト表です。「🔄 最新に更新」で最新データを確認できます。</div>
<div id="content"><div class="loading">📊 出勤表を読み込んでいます...</div></div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbzVretuyWf7A5QZEdQM8D2gbHi24t_NWm5U1U00VmXqjziSNi4EWLqnBnefE9c-KjKS/exec';

function goBack(){
  var base=location.href.substring(0,location.href.lastIndexOf('/')+1);
  location.href=base+'cafe-shift-new.html';
}

function show(d){
  document.title='Cafe照 '+(d.title||'月間出勤表');
  document.getElementById('content').innerHTML=
    '<h2>'+(d.title||'月間出勤表')+'</h2>'+(d.body||'');
  document.getElementById('info').textContent=
    (d.savedAt?'作成：'+d.savedAt:'')+'　✓ 読込完了';
  if(!localStorage.getItem('cafeShift')){
    document.getElementById('banner').style.display='block';
  }
}

function showError(msg){
  document.getElementById('content').innerHTML=
    '<div class="nodata">'+msg+'</div>';
}

async function loadData(forceGas){
  document.getElementById('info').textContent='読み込み中...';

  // ローカルキャッシュをまず表示
  if(!forceGas){
    var local=localStorage.getItem('cafePrintData');
    if(local){
      try{
        var ld=JSON.parse(local);
        if(ld&&ld.title){ show(ld); }
      }catch(e){}
    }
  }

  // GASから取得
  try{
    document.getElementById('info').textContent='GASから取得中...';
    var r=await fetch(GAS+'?t='+Date.now(),{
      method:'GET',
      redirect:'follow',
      cache:'no-cache'
    });
    var text=await r.text();

    // JSONを抽出
    var start=text.indexOf('{');
    var end=text.lastIndexOf('}');
    if(start<0||end<0) throw new Error('JSONが見つかりません');
    var data=JSON.parse(text.slice(start,end+1));

    // printDataを探す
    var pd=data.printData;
    if(pd&&pd.title&&pd.body){
      localStorage.setItem('cafePrintData',JSON.stringify(pd));
      show(pd);
    } else {
      // ローカルにあればそれを使う
      var lc=localStorage.getItem('cafePrintData');
      if(lc){
        try{
          var lcd=JSON.parse(lc);
          if(lcd&&lcd.title){ show(lcd); document.getElementById('info').textContent+='（ローカルキャッシュ）'; }
        }catch(e){ showNoData(); }
      } else {
        showNoData();
      }
    }
  }catch(e){
    document.getElementById('info').textContent='GAS取得エラー: '+e.message;
    // ローカルにあればそれを使う
    var lc2=localStorage.getItem('cafePrintData');
    if(lc2){
      try{
        var lcd2=JSON.parse(lc2);
        if(lcd2&&lcd2.title){ show(lcd2); document.getElementById('info').textContent='ローカルキャッシュを表示中'; }
      }catch(e2){ showNoData(); }
    } else {
      showNoData();
    }
  }
}

function showNoData(){
  showError(
    '⚠ まだ出勤表が作成されていません。<br><br>'+
    'オーナーが以下の操作をすると表示されます：<br>'+
    '「📊 月間出勤表」タブを開く<br>↓<br>「🖨 印刷・PDF」ボタンをタップ<br><br>'+
    'その後このページを「🔄 最新に更新」してください。'
  );
  document.getElementById('info').textContent='データなし';
}

loadData(false);
</script>
</body>
</html>
