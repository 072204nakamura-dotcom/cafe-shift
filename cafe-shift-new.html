<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Café照 シフト管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f7f2;color:#1a2e20;min-height:100vh;}
:root{
  --accent:#2d7a4f;--gold:#c8962a;--green:#2d7a4f;--red:#b83030;--blue:#2060a0;
  --surface:#fff;--surface2:#e8f5ee;--border:#b8d8c4;--muted:#5a8a6a;
  --K:#2a6640;--P:#906020;--H:#1060a0;--D:#aa2020;--B:#7030aa;--C:#b06020;--BC:#903070;--BD:#5050a0;--W:#305080;--J:#405840;
  --open:#2d7a4f;
}
.hdr{background:#1a2e20;color:#f0f7f2;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.logo{font-family:'Playfair Display',serif;font-size:1.1rem;color:#7de8a8;letter-spacing:.05em;}
.logo-sub{font-size:.56rem;color:#5a8a6a;margin-left:5px;}
.save-btn{background:var(--accent);border:none;color:#fff;padding:7px 13px;border-radius:7px;font-size:.76rem;font-family:inherit;cursor:pointer;}
.sync-st{font-size:.54rem;color:#5a8a6a;text-align:right;margin-top:2px;}
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto;}
.tab{flex:1;padding:10px 5px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:.7rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.page{display:none;padding:12px;}
.page.on{display:block;}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.mtitle{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--accent);}
.nbtn{background:#fff;border:1px solid var(--border);color:#1a2e20;padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.82rem;}
.irow{display:flex;gap:6px;margin-bottom:11px;flex-wrap:wrap;}
.icard{flex:1;min-width:68px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 8px;border-top:3px solid var(--accent);}
.icard .lbl{font-size:.54rem;color:var(--muted);}
.icard .val{font-size:1.05rem;font-weight:700;font-family:'Playfair Display',serif;}
.legend{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;font-size:.6rem;color:var(--muted);}
.ldot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px;}
/* ── 役割バッジ ── */
.role-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:.62rem;font-weight:700;margin:1px;}
.rb-K{background:rgba(42,102,64,.15);color:var(--K);}
.rb-P{background:rgba(144,96,32,.15);color:var(--P);}
.rb-H{background:rgba(16,96,160,.15);color:var(--H);}
.rb-D{background:rgba(170,32,32,.15);color:var(--D);}
.rb-B{background:rgba(112,48,170,.15);color:var(--B);}
.rb-C{background:rgba(176,96,32,.15);color:var(--C);}
.rb-BC{background:rgba(144,48,112,.15);color:var(--BC);}
.rb-BD{background:rgba(80,80,160,.15);color:var(--BD);}
.rb-W{background:rgba(48,80,128,.15);color:var(--W);}
.rb-J{background:rgba(64,88,64,.15);color:var(--J);}
/* ── CALENDAR ── */
.cal-wrap{overflow-x:auto;}
.cal{width:100%;border-collapse:separate;border-spacing:2px;min-width:320px;}
.cal th{font-size:.63rem;color:var(--muted);padding:3px;text-align:center;}
.cal th.su{color:var(--red);}
.cal th.sa{color:var(--blue);}
.cday{background:#fff;border:1px solid var(--border);border-radius:7px;padding:4px 3px;vertical-align:top;min-height:80px;cursor:pointer;transition:box-shadow .15s;}
.cday:hover{box-shadow:0 2px 7px rgba(0,0,0,.1);}
.cday.empty{background:transparent;border-color:transparent;cursor:default;}
.cday.closed{background:#f0ede8;opacity:.65;}
.cday.ok{border-color:rgba(45,122,79,.45);background:#f0fff5;}
.cday.ng{border-color:rgba(184,48,48,.4);background:#fff5f5;}
.cday.today .dnum{background:var(--accent);color:#fff;border-radius:50%;}
.cday.su .dnum{color:var(--red);}
.cday.sa .dnum{color:var(--blue);}
.dtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;}
.dnum{width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:500;flex-shrink:0;}
.hol-mark{font-size:.36rem;color:var(--red);display:block;line-height:1;text-align:center;}
.sb{border-radius:4px;padding:2px 4px;margin-bottom:2px;font-size:.5rem;background:rgba(45,122,79,.08);border-left:2px solid var(--accent);}
.sb.closed-s{background:var(--surface2);border-left:2px solid #ccc;}
.sl{font-weight:700;font-size:.48rem;color:var(--accent);}
.sl.closed-s{color:var(--muted);}
.sc{display:flex;flex-wrap:wrap;gap:1px;margin-top:1px;}
.scc{font-size:.44rem;padding:0 3px;border-radius:3px;font-weight:700;}
.scc-K{background:rgba(42,102,64,.18);color:var(--K);}
.scc-P{background:rgba(144,96,32,.18);color:var(--P);}
.scc-H{background:rgba(16,96,160,.18);color:var(--H);}
.scc-D{background:rgba(170,32,32,.18);color:var(--D);}
.scc-B{background:rgba(112,48,170,.18);color:var(--B);}
.scc-C{background:rgba(176,96,32,.18);color:var(--C);}
.scc-BC{background:rgba(144,48,112,.18);color:var(--BC);}
.scc-BD{background:rgba(80,80,160,.18);color:var(--BD);}
.scc-W{background:rgba(48,80,128,.18);color:var(--W);}
.scc-J{background:rgba(64,88,64,.18);color:var(--J);}
.sa2{font-size:.46rem;color:var(--red);}
/* ── MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:16px;}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mtl{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--accent);}
.xbtn{background:var(--surface2);border:none;width:27px;height:27px;border-radius:50%;cursor:pointer;font-size:.95rem;}
.sp{border-radius:10px;margin-bottom:11px;overflow:hidden;border:1px solid var(--border);}
.sp-head{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:rgba(45,122,79,.1);}
.sp-time{font-size:.73rem;font-weight:700;color:var(--accent);}
.stoggle{padding:5px 13px;border-radius:5px;border:1px solid var(--border);background:#fff;font-family:inherit;font-size:.76rem;cursor:pointer;}
.stoggle.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:700;}
.sp-body{padding:10px 11px;background:#fff;}
.albl{font-size:.68rem;font-weight:700;color:var(--muted);margin:6px 0 4px;display:flex;align-items:center;gap:5px;}
.arows{display:flex;flex-direction:column;gap:4px;margin-bottom:7px;}
.arow{background:var(--surface2);border-radius:7px;padding:7px 9px;display:grid;grid-template-columns:7px 1fr auto;gap:6px;align-items:start;}
.arow.unav{opacity:.38;}
.adot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;margin-top:6px;}
.aname{font-size:.78rem;font-weight:500;display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.tov{display:flex;align-items:center;gap:3px;margin-top:3px;flex-wrap:wrap;}
.tovlbl{font-size:.56rem;color:var(--muted);}
.tovinput{font-size:.64rem;font-family:monospace;border:1px solid var(--border);border-radius:4px;padding:2px 4px;background:#fff;color:#1a2e20;width:62px;}
.rsel{font-size:.68rem;font-family:inherit;background:#fff;border:1px solid var(--border);border-radius:5px;padding:3px 4px;color:#1a2e20;cursor:pointer;min-width:100px;}
.malert{background:rgba(184,48,48,.08);border:1px solid rgba(184,48,48,.25);border-radius:6px;padding:6px 10px;font-size:.68rem;color:var(--red);margin-top:5px;}
/* ── LINE PAGE ── */
.pcard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:11px;}
.ptitle{font-size:.8rem;font-weight:700;color:var(--accent);margin-bottom:8px;}
.psel{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:#1a2e20;font-family:inherit;font-size:.78rem;margin-bottom:7px;}
.pta{width:100%;padding:9px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:#1a2e20;font-family:monospace;font-size:.7rem;min-height:75px;resize:vertical;margin-bottom:7px;}
.pbtn{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:9px;width:100%;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;}
.pbtn.g{background:var(--green);}
.pres{margin-top:7px;background:var(--surface2);border-radius:8px;padding:9px;font-size:.73rem;line-height:1.8;}
.tok{color:var(--green);}.terr{color:var(--red);}
.nbox{background:#f0fff5;border:1px solid #90d0a8;border-radius:8px;padding:11px;font-size:.7rem;white-space:pre-wrap;font-family:monospace;line-height:1.65;color:#1a3a20;margin-top:7px;}
.cbtn{background:#25d366;border:none;color:#fff;border-radius:7px;padding:8px;width:100%;font-family:inherit;font-size:.8rem;cursor:pointer;margin-top:6px;}
/* ── LINE HISTORY ── */
.hist-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:9px;}
.hist-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.hist-name{font-size:.82rem;font-weight:700;}
.hist-date{font-size:.58rem;color:var(--muted);}
.hist-days{font-size:.72rem;color:var(--red);font-weight:700;margin-bottom:5px;}
.hist-raw{font-size:.64rem;color:var(--muted);background:var(--surface2);border-radius:6px;padding:6px 8px;font-family:monospace;white-space:pre-wrap;line-height:1.5;}
.hist-actions{display:flex;gap:6px;margin-top:6px;}
.hist-btn{font-size:.66rem;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:#fff;cursor:pointer;}
.hist-btn.reapply{border-color:var(--green);color:var(--green);}
.hist-btn.del{border-color:rgba(184,48,48,.4);color:var(--red);}
/* ── STAFF PAGE ── */
.scards{display:flex;flex-direction:column;gap:9px;}
.scard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 13px;cursor:default;transition:box-shadow .15s;}
.scard.dragging{opacity:.4;box-shadow:0 4px 15px rgba(0,0,0,.2);}
.scard.drag-over{border-color:var(--accent);border-style:dashed;}
.scard-header{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.drag-handle{font-size:1rem;color:var(--muted);cursor:grab;padding:2px 4px;user-select:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.scname{flex:1;font-size:.86rem;padding:5px 7px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);font-family:inherit;color:#1a2e20;min-width:110px;}
.delbtn{background:transparent;border:1px solid rgba(184,48,48,.4);color:var(--red);border-radius:5px;padding:3px 9px;cursor:pointer;font-size:.7rem;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.sgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.flbl{font-size:.6rem;color:var(--muted);margin-bottom:2px;display:block;}
.finput,.fsel{width:100%;padding:5px 6px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:#1a2e20;font-family:inherit;font-size:.73rem;}
/* AVAIL CAL */
.acal-wrap{margin-top:9px;}
.acal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.acal-lbl{font-size:.66rem;font-weight:700;color:var(--accent);}
.acal-btns{display:flex;gap:3px;}
.acal-btn{font-size:.58rem;padding:2px 6px;border-radius:4px;cursor:pointer;background:#fff;}
.acal-btn.ok{border:1px solid var(--green);color:var(--green);}
.acal-btn.ng{border:1px solid var(--red);color:var(--red);}
.acal-btn.rs{border:1px solid var(--border);color:var(--muted);}
.acal-grid{display:flex;flex-wrap:wrap;gap:3px;}
.acal-dlbl{width:26px;height:15px;font-size:.52rem;text-align:center;color:var(--muted);}
.acal-dlbl.su{color:var(--red);}
.acal-dlbl.sa{color:var(--blue);}
.acal-empty{width:26px;height:26px;}
.acal-day{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .12s;}
.acal-day.avail{background:var(--accent);color:#fff;}
.acal-day.unavail{background:var(--surface2);border-color:var(--border);}
.acal-day.su{color:var(--red);}
.acal-day.sa{color:var(--blue);}
.acal-day.avail.su,.acal-day.avail.sa{color:#fff;}
.addbtn{background:var(--surface2);border:1px dashed var(--border);color:var(--muted);border-radius:8px;padding:9px;width:100%;font-family:inherit;font-size:.8rem;cursor:pointer;margin-top:4px;}
/* ── PDF GUIDE ── */
#pdfGuide{display:none;background:#f0fff5;border:2px solid var(--accent);border-radius:12px;padding:14px;margin-bottom:12px;}
@media print{
  .hdr,.tabs,.ov{display:none!important;}
  .page{display:none!important;}
  .page.print-target{display:block!important;}
  #monthlySummary{display:none!important;}
  #monthlyLegend{display:none!important;}
  .page.print-target .mnav{display:none!important;}
  .page.print-target>div:first-child+div{display:none!important;}
  #halfTable1{page-break-after:always;}
  #halfTable2{page-break-before:always;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}
  @page{size:A4 landscape;margin:6mm;}
  body{font-size:9pt;}
}
</style>
</head>
<body>
<div class="hdr">
  <div><span class="logo">Café 照</span><span class="logo-sub">SHIFT</span></div>
  <div style="text-align:right">
    <button class="save-btn" onclick="syncSave()">☁ 保存・同期</button>
    <div class="sync-st" id="syncSt">未読込</div>
  </div>
</div>
<div class="tabs">
  <button class="tab on" onclick="showPage('cal',this)">📅 月間</button>
  <button class="tab" onclick="showPage('line',this)">💬 LINE</button>
  <button class="tab" onclick="showPage('hist',this)">📂 履歴</button>
  <button class="tab" onclick="showPage('monthly',this)">📊 出勤表</button>
  <button class="tab" onclick="showPage('staff',this)">👤 スタッフ</button>
</div>

<!-- ===== CALENDAR ===== -->
<div class="page on" id="page-cal">
  <div class="mnav">
    <button class="nbtn" onclick="chMonth(-1)">◀</button>
    <div class="mtitle" id="calTitle"></div>
    <button class="nbtn" onclick="chMonth(1)">▶</button>
  </div>
  <div class="irow" id="infoRow"></div>
  <div class="legend">
    <span><span class="ldot" style="background:var(--accent)"></span>出勤あり</span>
    <span><span class="ldot" style="background:var(--red)"></span>役割不足</span>
    <span><span class="ldot" style="background:#ccc"></span>定休日</span>
  </div>
  <div class="cal-wrap"><table class="cal" id="calTable"></table></div>
</div>

<!-- ===== LINE ===== -->
<div class="page" id="page-line">
  <div class="pcard">
    <div class="ptitle">📋 欠勤希望収集メッセージを生成</div>
    <button class="pbtn g" onclick="genReqMsg()">来月のメッセージを生成</button>
    <div id="reqMsgRes"></div>
  </div>
  <div class="pcard">
    <div class="ptitle">💬 欠勤希望日を貼り付け登録</div>
    <label class="flbl">スタッフを選択</label>
    <select class="psel" id="pasteStaff"></select>
    <label class="flbl">LINEのテキストをそのまま貼り付け</label>
    <textarea class="pta" id="pasteTxt" placeholder="例：5日、13日、20日&#10;例：5日（火）13日（水）"></textarea>
    <button class="pbtn" onclick="parseLine()">📅 カレンダーに反映して履歴に保存</button>
    <div id="parseRes"></div>
  </div>
  <div class="pcard">
    <div class="ptitle">📤 前日通知メッセージを生成</div>
    <label class="flbl">通知する日付</label>
    <input type="date" class="psel" id="noticeDate" style="margin-bottom:7px">
    <button class="pbtn g" onclick="genNotice()">前日通知を生成</button>
    <div id="noticeRes"></div>
  </div>
</div>

<!-- ===== LINE HISTORY ===== -->
<div class="page" id="page-hist">
  <div class="mnav">
    <button class="nbtn" onclick="chMonth(-1);renderHist(false)">◀</button>
    <div class="mtitle" id="histTitle"></div>
    <button class="nbtn" onclick="chMonth(1);renderHist(false)">▶</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
    <button class="nbtn" id="histAllBtn" onclick="toggleHistAll()"
      style="font-size:.7rem;background:var(--surface2);border-color:var(--border)">
      📋 全月一覧
    </button>
    <button class="nbtn" onclick="downloadHistCSV()"
      style="font-size:.7rem;background:#2060a0;color:#fff;border-color:#2060a0">
      💾 CSVで保存
    </button>
    <button class="nbtn" onclick="downloadHistJSON()"
      style="font-size:.7rem;background:var(--accent);color:#fff;border-color:var(--accent)">
      📦 JSONバックアップ
    </button>
    <span id="histSaveStatus" style="font-size:.62rem;color:var(--muted)"></span>
  </div>
  <div id="histBody"></div>
</div>

<!-- ===== MONTHLY ===== -->
<div class="page" id="page-monthly">
  <div class="mnav">
    <button class="nbtn" onclick="chMonth(-1);renderMonthly()">◀</button>
    <div class="mtitle" id="monthlyTitle"></div>
    <button class="nbtn" onclick="chMonth(1);renderMonthly()">▶</button>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end;align-items:center;margin-bottom:9px;flex-wrap:wrap">
    <button class="nbtn" onclick="printMonthly()" style="font-size:.7rem;background:#2060a0;color:#fff;border-color:#2060a0">🖨 印刷</button>
    <button class="nbtn" onclick="showPdfGuide()" style="font-size:.7rem;background:var(--accent);color:#fff;border-color:var(--accent)">📄 PDF保存</button>
  </div>
  <div id="pdfGuide">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:.82rem;font-weight:700;color:var(--accent)">📄 PDF保存の手順</span>
      <button onclick="document.getElementById('pdfGuide').style.display='none'" style="background:var(--surface2);border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.9rem">✕</button>
    </div>
    <div style="font-size:.75rem;line-height:2;color:#1a2e20">
      <div style="background:#fff;border-radius:8px;padding:8px 12px;margin-bottom:8px;border-left:4px solid #2060a0">
        <b>💻 PC（Windows）の場合</b><br>
        ① 下の「印刷ダイアログを開く」ボタンをクリック<br>
        ② プリンターの欄で <b>「Microsoft Print to PDF」</b> を選択<br>
        ③「印刷」ボタンをクリック → 保存場所を選んで保存
      </div>
      <div style="background:#fff;border-radius:8px;padding:8px 12px;border-left:4px solid #30a060">
        <b>🍎 Mac の場合</b><br>
        ① 下の「印刷ダイアログを開く」ボタンをクリック<br>
        ② 左下の <b>「PDF」</b> ボタン → 「PDFとして保存」
      </div>
    </div>
    <button onclick="startPdfPrint()" style="background:var(--accent);border:none;color:#fff;border-radius:8px;padding:10px;width:100%;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;margin-top:10px">
      🖨 印刷ダイアログを開く（前半・後半 各1ページ）
    </button>
  </div>
  <div id="monthlyBody"></div>
</div>

<!-- ===== STAFF ===== -->
<div class="page" id="page-staff">
  <div class="mnav" style="margin-bottom:9px">
    <button class="nbtn" onclick="chMonth(-1);renderStaff()">◀</button>
    <div class="mtitle" id="staffTitle"></div>
    <button class="nbtn" onclick="chMonth(1);renderStaff()">▶</button>
  </div>
  <p style="font-size:.64rem;color:var(--muted);margin-bottom:9px">☰ を長押し／ドラッグして並び順を変更できます</p>
  <div class="scards" id="staffCards"></div>
  <button class="addbtn" onclick="addStaff()">＋ スタッフを追加</button>
</div>

<!-- ===== MODAL ===== -->
<div class="ov" id="ov" onclick="closeBg(event)">
  <div class="modal">
    <div class="mhdr">
      <div class="mtl" id="modalTitle"></div>
      <button class="xbtn" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const ROLES = [
  {id:'K', name:'調理メイン',    color:'#2a6640', must:true},
  {id:'P', name:'ピザ場',        color:'#906020', must:false},
  {id:'H', name:'配膳・オーダー',color:'#1060a0', must:true},
  {id:'D', name:'料理仕上(デシャップ)', color:'#aa2020', must:false},
  {id:'B', name:'ドリンク・デザート',   color:'#7030aa', must:false},
  {id:'C', name:'レジ・案内',    color:'#b06020', must:false},
  {id:'BC',name:'B+C兼務',       color:'#903070', must:false},
  {id:'BD',name:'B+D兼務',       color:'#5050a0', must:false},
  {id:'W', name:'洗い場',        color:'#305080', must:false},
  {id:'J', name:'事務作業',      color:'#405840', must:false},
];

const JP_HOL = new Set(['2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06','2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13','2025-11-03','2025-11-23','2025-11-24','2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05']);

// ============================================================
// STATE
// ============================================================
let staff = [];
let dayData = {};
let lineHistory = [];
let curY = new Date().getFullYear(), curM = new Date().getMonth();
let nextId = 1, nextHistId = 1;
let dragSrc = null;

// ============================================================
// HELPERS
// ============================================================
function dk(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function gs(id){ return staff.find(s=>s.id===id); }
function dd(key){
  if(!dayData[key]) dayData[key]={open:true,assignments:[]};
  const d=dayData[key];
  if(d.open===undefined) d.open=true;
  if(!d.assignments) d.assignments=[];
  return d;
}

function isAvailDay(s, key){
  if(s.avail && s.avail[key]===false) return false;
  return true;
}

function canWork(s, key){
  return isAvailDay(s, key);
}

function getDayOpen(key){
  const dow = new Date(key).getDay();
  // 定休日設定があればそれを優先
  if(dayData[key] && dayData[key].open===false) return false;
  if(dayData[key] && dayData[key].open===true) return true;
  return true; // デフォルト営業
}

function sessAssign(key){
  return dd(key).assignments.filter(a=>a.role).map(a=>({...a, s:gs(a.staffId)})).filter(x=>x.s);
}

function checkRoles(key){
  const covered = new Set(sessAssign(key).map(a=>a.role));
  return ROLES.filter(r=>r.must && !covered.has(r.id)).map(r=>r.id);
}

function countDays(staffId){
  // 全出勤日数
  const n = new Date(curY, curM+1, 0).getDate();
  let c = 0;
  for(let d=1;d<=n;d++){
    const k=dk(curY,curM,d);
    if(!getDayOpen(k)) continue;
    if(dd(k).assignments.some(a=>a.staffId===staffId&&a.role)) c++;
  }
  return c;
}
function countWeekendDays(staffId){
  // 土日祝のみの出勤日数
  const n = new Date(curY, curM+1, 0).getDate();
  let c = 0;
  for(let d=1;d<=n;d++){
    const k=dk(curY,curM,d), dow=new Date(curY,curM,d).getDay();
    const isHol = JP_HOL.has(k);
    if(dow!==0 && dow!==6 && !isHol) continue; // 平日スキップ
    if(!getDayOpen(k)) continue;
    if(dd(k).assignments.some(a=>a.staffId===staffId&&a.role)) c++;
  }
  return c;
}

function getRoleLabel(s){
  const roles = s.roles||['H'];
  return roles.join('/');
}

function getRoleColor(roleId){
  const r = ROLES.find(x=>x.id===roleId);
  return r ? r.color : '#666';
}

// ============================================================
// CALENDAR
// ============================================================
function chMonth(d){ curM+=d; if(curM<0){curM=11;curY--;} if(curM>11){curM=0;curY++;} renderCal(); }

function renderCal(){
  document.getElementById('calTitle').textContent = `${curY}年 ${curM+1}月`;
  const y=curY, m=curM, first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const todayK = dk(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  let totalOpen=0, totalMiss=0;

  let h = '<thead><tr>';
  ['日','月','火','水','木','金','土'].forEach((dn,i)=>h+=`<th class="${i===0?'su':i===6?'sa':''}">${dn}</th>`);
  h += '</tr></thead><tbody><tr>';
  for(let i=0;i<first;i++) h += '<td class="cday empty"></td>';
  let col = first;

  for(let d=1;d<=days;d++){
    const key=dk(y,m,d), dow=new Date(y,m,d).getDay(), isHol=JP_HOL.has(key);
    const sunsat = dow===0?'su':dow===6?'sa':'';
    const isOpen = getDayOpen(key);
    let anyMiss = false;
    if(isOpen && checkRoles(key).length) anyMiss=true;
    if(isOpen) totalOpen++;
    if(anyMiss) totalMiss++;

    let cls = `cday ${sunsat} ${key===todayK?'today':''}`;
    if(!isOpen) cls += ' closed';
    else if(anyMiss) cls += ' ng';
    else cls += ' ok';

    h += `<td class="${cls}" onclick="openModal('${key}',${d})">`;
    h += `<div class="dtop"><span class="dnum">${d}${isHol?'<span class="hol-mark">祝</span>':''}</span>`;
    h += `<span style="font-size:.42rem;color:${!isOpen?'var(--muted)':anyMiss?'var(--red)':'var(--accent)'}">${!isOpen?'休':'営業'}</span></div>`;

    if(!isOpen){
      h += `<div style="font-size:.48rem;color:var(--muted);margin-top:3px">定休日</div>`;
    } else {
      const asgns = sessAssign(key);
      const miss = checkRoles(key);
      h += `<div class="sb"><span class="sl">☀ 営業</span>`;
      if(asgns.length){
        h += `<div class="sc">`;
        asgns.forEach(a=>{
          h += `<span class="scc scc-${a.role}">${a.s.name.slice(-2)} ${a.role}</span>`;
        });
        h += `</div>`;
      }
      if(miss.length) h += `<div class="sa2">⚠${miss.join('・')}</div>`;
      h += `</div>`;
    }
    h += '</td>';
    col++;
    if(col%7===0 && d<days) h += '</tr><tr>';
  }
  while(col%7!==0){ h+='<td class="cday empty"></td>'; col++; }
  h += '</tr></tbody>';
  document.getElementById('calTable').innerHTML = h;
  document.getElementById('infoRow').innerHTML = `
    <div class="icard"><div class="lbl">営業日数</div><div class="val" style="color:var(--accent)">${totalOpen}</div></div>
    <div class="icard"><div class="lbl">要確認日</div><div class="val" style="color:var(--red)">${totalMiss}</div></div>
    <div class="icard"><div class="lbl">スタッフ</div><div class="val">${staff.length}</div></div>`;
}

// ============================================================
// MODAL
// ============================================================
function openModal(key, d){
  const dateObj=new Date(key), dow=dateObj.getDay();
  const DOW=['日','月','火','水','木','金','土'];
  document.getElementById('modalTitle').textContent = `${curY}年${curM+1}月${d}日（${DOW[dow]}）`;
  renderModalBody(key, d, dow);
  renderCal();
  document.getElementById('ov').classList.add('on');
}

function renderModalBody(key, d, dow){
  const DOW=['日','月','火','水','木','金','土'];
  const isOpen = getDayOpen(key);
  let h = '';

  // 営業/定休切り替え
  h += `<div class="sp">
    <div class="sp-head">
      <span class="sp-time">☀ 営業設定</span>
      <button class="stoggle ${isOpen?'on':''}" onclick="toggleDayOpen('${key}',this)">${isOpen?'✓ 営業':'定休'}</button>
    </div>`;

  if(isOpen){
    h += `<div class="sp-body">`;
    h += buildAssignRows(key);
    const miss = checkRoles(key);
    if(miss.length) h += `<div class="malert">⚠ ${miss.join('・')}が未アサインです</div>`;
    h += `</div>`;
  }
  h += `</div>`;

  document.getElementById('modalBody').innerHTML = h;
}

function toggleDayOpen(key, btn){
  const data = dd(key);
  data.open = !data.open;
  btn.className = 'stoggle ' + (data.open?'on':'');
  btn.textContent = data.open ? '✓ 営業' : '定休';
  // モーダル本体を再描画
  const d = parseInt(key.split('-')[2]);
  const dow = new Date(key).getDay();
  renderModalBody(key, d, dow);
  renderCal();
}

function buildAssignRows(key){
  const data = dd(key);
  const avail = staff.filter(s=>canWork(s,key));
  const unavail = staff.filter(s=>!canWork(s,key));
  let h = `<div class="albl">☀ 出勤可能スタッフ</div><div class="arows">`;

  if(!avail.length) h += `<div style="font-size:.7rem;color:var(--muted);padding:6px">出勤可能なスタッフがいません</div>`;

  avail.forEach(s=>{
    const asgn = data.assignments.find(a=>a.staffId===s.id);
    const curRole = (asgn&&asgn.role)||'';
    const curFrom = (asgn&&asgn.timeFrom)||(s.defFrom||'09:00');
    const curTo   = (asgn&&asgn.timeTo)||(s.defTo||'16:00');
    const dotColor = curRole ? getRoleColor(curRole) : '#ccc';

    h += `<div class="arow">
      <div class="adot" id="dot-${s.id}" style="background:${dotColor}"></div>
      <div>
        <div class="aname">
          <span style="font-size:.62rem;padding:1px 5px;border-radius:4px;background:rgba(45,122,79,.12);color:var(--accent);font-weight:700">${getRoleLabel(s)}</span>
          ${s.name}
          <span style="font-size:.56rem;color:var(--muted)">${countDays(s.id)}日(土日祝${countWeekendDays(s.id)}/${s.maxWeekendDays||8})</span>
        </div>
        <div class="tov">
          <span class="tovlbl">出:</span>
          <input type="time" class="tovinput" value="${curFrom}" onchange="setTime('${key}',${s.id},'timeFrom',this.value)">
          <span class="tovlbl">〜</span>
          <input type="time" class="tovinput" value="${curTo}" onchange="setTime('${key}',${s.id},'timeTo',this.value)">
        </div>
      </div>
      <select class="rsel" onchange="setRole('${key}',${s.id},this.value)">
        <option value="" ${!curRole?'selected':''}>― 休み</option>
        ${ROLES.filter(r=>(s.roles||[]).includes(r.id)).map(r=>`<option value="${r.id}" ${curRole===r.id?'selected':''}>${r.id}：${r.name}</option>`).join('')}
      </select>
    </div>`;
  });
  h += `</div>`;

  if(unavail.length){
    h += `<details style="margin-top:3px"><summary style="font-size:.65rem;color:var(--muted);cursor:pointer">欠勤希望（${unavail.length}名）</summary>
      <div class="arows" style="margin-top:4px">`;
    unavail.forEach(s=>{
      h += `<div class="arow unav"><div class="adot"></div><div><div class="aname">${s.name}</div></div><span style="font-size:.6rem;color:var(--muted)">欠勤希望</span></div>`;
    });
    h += `</div></details>`;
  }
  return h;
}

function setRole(key, staffId, role){
  const data = dd(key);
  if(!role){
    data.assignments = data.assignments.filter(x=>x.staffId!==staffId);
  } else {
    let a = data.assignments.find(x=>x.staffId===staffId);
    if(!a){ a={staffId, role:'', timeFrom:null, timeTo:null}; data.assignments.push(a); }
    a.role = role;
  }
  const dot = document.getElementById(`dot-${staffId}`);
  if(dot) dot.style.background = role ? getRoleColor(role) : '#ccc';
  renderCal();
}

function setTime(key, staffId, field, val){
  const data = dd(key);
  let a = data.assignments.find(x=>x.staffId===staffId);
  if(!a){ a={staffId, role:'', timeFrom:null, timeTo:null}; data.assignments.push(a); }
  a[field] = val;
}

function closeModal(){ document.getElementById('ov').classList.remove('on'); }
function closeBg(e){ if(e.target===document.getElementById('ov')) closeModal(); }

// ============================================================
// LINE
// ============================================================
function updatePasteStaff(){
  document.getElementById('pasteStaff').innerHTML = staff.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

function parseLine(){
  const sid = parseInt(document.getElementById('pasteStaff').value);
  const txt = document.getElementById('pasteTxt').value.trim();
  const res = document.getElementById('parseRes');
  if(!txt){ res.innerHTML='<div class="pres terr">テキストを入力してください</div>'; return; }
  const s = gs(sid); if(!s) return;
  const daysIn = new Date(curY,curM+1,0).getDate();
  const unav = new Set();
  txt.split('\n').forEach(line=>{
    for(const mm of line.matchAll(/([0-9]{1,2})[日]?\s*[〜~\-]\s*([0-9]{1,2})日?/g)){
      for(let d2=parseInt(mm[1]);d2<=parseInt(mm[2]);d2++) if(d2>=1&&d2<=daysIn) unav.add(d2);
    }
    for(const mm of line.matchAll(/([0-9]{1,2})日/g)){ const d=parseInt(mm[1]); if(d>=1&&d<=daysIn) unav.add(d); }
    for(const mm of line.matchAll(/(?<![0-9])([1-9]|[12][0-9]|3[01])(?![0-9日])/g)){ const d=parseInt(mm[1]); if(d>=1&&d<=daysIn) unav.add(d); }
  });
  if(!unav.size){ res.innerHTML='<div class="pres terr">日付が読み取れませんでした</div>'; return; }
  const arr = [...unav].sort((a,b)=>a-b);
  if(!s.avail) s.avail={};
  arr.forEach(d=>{ s.avail[dk(curY,curM,d)]=false; });
  const monthKey = `${curY}-${String(curM+1).padStart(2,'0')}`;
  lineHistory.push({id:nextHistId++, staffId:s.id, staffName:s.name, month:monthKey, dates:arr, raw:txt, savedAt:new Date().toLocaleString('ja-JP')});
  renderCal();
  document.getElementById('pasteTxt').value = '';
  res.innerHTML = `<div class="pres"><span class="tok">✓ ${s.name}さんの欠勤を登録し、履歴に保存しました</span><br>欠勤：<span style="color:var(--red)">${arr.join('・')}日</span></div>`;
}

function genReqMsg(){
  const y=curY, m=curM+1, next=m>=12?1:m+1, ny=m>=12?y+1:y;
  const msg = `【シフト希望】Café照\n\n${ny}年${next}月の欠勤希望日を\n${m}月15日までにLINEで教えてください☕\n\n例：5日、13日、20日\n\nよろしくお願いします！`;
  const el = document.getElementById('reqMsgRes');
  el.innerHTML = `<div class="nbox">${msg.replace(/\n/g,'<br>')}</div><button class="cbtn" id="reqCopyBtn">📋 LINEにコピー</button>`;
  document.getElementById('reqCopyBtn').onclick = function(){
    navigator.clipboard.writeText(msg).then(()=>{ this.textContent='✓ コピーしました！'; setTimeout(()=>this.textContent='📋 LINEにコピー',2000); });
  };
}

function genNotice(){
  const dateStr = document.getElementById('noticeDate').value;
  if(!dateStr){ document.getElementById('noticeRes').innerHTML='<div class="pres terr">日付を選んでください</div>'; return; }
  const key=dateStr, dObj=new Date(dateStr), DOW=['日','月','火','水','木','金','土'];
  const label = `${dObj.getMonth()+1}月${dObj.getDate()}日（${DOW[dObj.getDay()]}）`;
  if(!getDayOpen(key)){ document.getElementById('noticeRes').innerHTML='<div class="pres terr">この日は定休日です</div>'; return; }
  let lines = [`【明日のシフト】Café照`,'━━━━━━━━━━━',`📅 ${label}`,''];
  const asgns = dd(key).assignments.filter(a=>a.role);
  lines.push(`☀ 営業時間　${getOpenHours(key)}`);
  if(!asgns.length){ lines.push('　未設定\n'); }
  else {
    asgns.forEach(a=>{
      const s=gs(a.staffId); if(!s) return;
      const ro = ROLES.find(r=>r.id===a.role);
      lines.push(`・${s.name}　${a.timeFrom||s.defFrom||'09:00'}〜${a.timeTo||s.defTo||'16:00'}　${a.role}：${ro?ro.name:a.role}`);
    });
    lines.push('');
  }
  lines.push('よろしくお願いします☕');
  const msg = lines.join('\n');
  const el = document.getElementById('noticeRes');
  el.innerHTML = `<div class="nbox">${msg.replace(/\n/g,'<br>')}</div><button class="cbtn" id="noticeCopyBtn">📋 LINEにコピー</button>`;
  document.getElementById('noticeCopyBtn').onclick = function(){
    navigator.clipboard.writeText(msg).then(()=>{ this.textContent='✓ コピーしました！'; setTimeout(()=>this.textContent='📋 LINEにコピー',2000); });
  };
}

function getOpenHours(key){
  const data = dd(key);
  if(data.openFrom && data.openTo) return `${data.openFrom}〜${data.openTo}`;
  return '10:00〜17:00';
}

// ============================================================
// LINE HISTORY
// ============================================================
function renderHist(){
  const monthKey = `${curY}-${String(curM+1).padStart(2,'0')}`;
  document.getElementById('histTitle').textContent = `${curY}年${curM+1}月　LINE履歴`;
  const recs = lineHistory.filter(r=>r.month===monthKey).sort((a,b)=>b.id-a.id);
  let h = '';
  if(!recs.length){
    h = `<div style="text-align:center;padding:30px;color:var(--muted);font-size:.8rem">この月の履歴はありません</div>`;
    document.getElementById('histBody').innerHTML = h; return;
  }
  const daysIn = new Date(curY,curM+1,0).getDate();
  const staffMap = {};
  recs.forEach(r=>{ if(!staffMap[r.staffId]) staffMap[r.staffId]={name:r.staffName,dates:new Set()}; r.dates.forEach(d=>staffMap[r.staffId].dates.add(d)); });
  h += `<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;overflow-x:auto">`;
  h += `<div style="font-size:.76rem;font-weight:700;color:var(--accent);margin-bottom:8px">📊 欠勤希望まとめ</div>`;
  h += `<table style="border-collapse:collapse;font-size:.6rem;min-width:${daysIn*18+90}px">`;
  h += `<thead><tr><th style="background:var(--surface2);padding:3px 7px;text-align:left;min-width:80px;border:1px solid var(--border)">スタッフ</th>`;
  for(let d=1;d<=daysIn;d++){
    const key=dk(curY,curM,d), dow=new Date(curY,curM,d).getDay(), isH=JP_HOL.has(key);
    const col = dow===0||isH?'var(--red)':dow===6?'var(--blue)':'var(--muted)';
    h += `<th style="background:var(--surface2);padding:2px;text-align:center;min-width:18px;border:1px solid var(--border);color:${col}">${d}</th>`;
  }
  h += `</tr></thead><tbody>`;
  Object.entries(staffMap).forEach(([sid,data])=>{
    h += `<tr><td style="background:var(--surface2);padding:3px 7px;font-weight:500;border:1px solid var(--border);white-space:nowrap">${data.name}</td>`;
    for(let d=1;d<=daysIn;d++){
      const dow = new Date(curY,curM,d).getDay();
      h += data.dates.has(d)
        ? `<td style="text-align:center;background:rgba(184,48,48,.12);color:var(--red);font-weight:700;border:1px solid var(--border)">✕</td>`
        : `<td style="text-align:center;background:${dow===0||dow===6?'rgba(0,0,0,.03)':''};border:1px solid var(--border)"></td>`;
    }
    h += `</tr>`;
  });
  h += `</tbody></table></div>`;
  recs.forEach(r=>{
    h += `<div class="hist-card">
      <div class="hist-hdr"><span class="hist-name">${r.staffName}</span><span class="hist-date">${r.savedAt}</span></div>
      <div class="hist-days">欠勤希望：${r.dates.join('・')}日（${r.dates.length}日間）</div>`;
    if(r.raw) h += `<details><summary style="font-size:.62rem;color:var(--muted);cursor:pointer;margin-bottom:4px">元のLINEテキストを表示</summary><div class="hist-raw">${r.raw}</div></details>`;
    h += `<div class="hist-actions">
      <button class="hist-btn reapply" onclick="reApplyHist(${r.id})">↩ カレンダーに再反映</button>
      <button class="hist-btn del" onclick="deleteHist(${r.id})">🗑 削除</button>
    </div></div>`;
  });
  document.getElementById('histBody').innerHTML = h;
}

function reApplyHist(hid){
  const r = lineHistory.find(x=>x.id===hid); if(!r) return;
  const s = gs(r.staffId); if(!s){ alert('スタッフが見つかりません'); return; }
  const parts=r.month.split('-'), y=parseInt(parts[0]), m=parseInt(parts[1])-1;
  if(!s.avail) s.avail={};
  r.dates.forEach(d=>{ s.avail[dk(y,m,d)]=false; });
  renderCal(); alert(`✓ ${r.staffName}さんの欠勤をカレンダーに反映しました`);
}

function deleteHist(hid){
  if(!confirm('この履歴を削除しますか？')) return;
  lineHistory = lineHistory.filter(x=>x.id!==hid);
  renderHist();
}

// ============================================================
// MONTHLY REPORT

function buildHalfTable(y, m, startDay, endDay){
  const DOW = ['日','月','火','水','木','金','土'];
  const days = endDay - startDay + 1;
  let h = `<table style="border-collapse:collapse;font-size:.72rem;width:100%;table-layout:fixed;">`;

  // ヘッダー
  h += `<thead><tr>`;
  h += `<th style="background:#1a2e20;color:#7de8a8;padding:5px 6px;text-align:left;width:80px;border:1px solid #2a4a30;font-size:.68rem">スタッフ</th>`;
  h += `<th style="background:#1a2e20;color:#7de8a8;padding:3px;text-align:center;width:28px;border:1px solid #2a4a30;font-size:.6rem">区分</th>`;
  for(let d=startDay;d<=endDay;d++){
    const key=dk(y,m,d), dow=new Date(y,m,d).getDay(), isH=JP_HOL.has(key);
    const col = dow===0||isH?'#ff8080':dow===6?'#80b0ff':'#7de8a8';
    const bg = '#1a2e20';
    h += `<th style="background:${bg};color:${col};padding:3px 2px;text-align:center;border:1px solid #2a4a30;font-size:.65rem;width:${100/days}%">${d}<br><span style="font-size:.52rem">${DOW[dow]}</span></th>`;
  }
  h += `<th style="background:#1a2e20;color:#7de8a8;padding:3px;text-align:center;width:26px;border:1px solid #2a4a30;font-size:.62rem">計</th>`;
  h += `</tr></thead><tbody>`;

  // スタッフ行
  staff.forEach(s=>{
    let total = 0;
    h += `<tr>`;
    h += `<td style="background:#f0f7f2;padding:4px 6px;font-weight:700;border:1px solid var(--border);white-space:nowrap;vertical-align:middle;font-size:.72rem;border-left:4px solid #2d7a4f">${s.name}</td>`;
    h += `<td style="background:#2d7a4f;padding:3px 4px;text-align:center;border:1px solid #1a5a30;font-size:.62rem;font-weight:700;color:#fff;white-space:nowrap">☀昼</td>`;

    for(let d=startDay;d<=endDay;d++){
      const key=dk(y,m,d), dow=new Date(y,m,d).getDay();
      const isOpen = getDayOpen(key);
      if(!isOpen){
        h += `<td style="background:#e8ede8;text-align:center;border:1px solid var(--border);font-size:.55rem;color:#aaa">定休</td>`;
        continue;
      }
      const asgn = dd(key).assignments.find(a=>a.staffId===s.id&&a.role);
      if(asgn){
        total++;
        const roleColor = getRoleColor(asgn.role);
        h += `<td style="text-align:center;padding:2px;border:1px solid ${roleColor}44;background:${roleColor}22;font-weight:700;color:${roleColor};font-size:.75rem">${asgn.role}</td>`;
      } else if(!canWork(s,key)){
        h += `<td style="background:#fff0f0;text-align:center;border:1px solid var(--border);color:#cc4444;font-size:.65rem">✕</td>`;
      } else {
        h += `<td style="background:#f8fbf8;text-align:center;border:1px solid #d0e8d8;color:#90b890;font-size:.65rem">·</td>`;
      }
    }
    h += `<td style="text-align:center;padding:2px;border:1px solid var(--border);background:#f0f7f2;font-weight:700;vertical-align:middle;font-size:.7rem;color:#1a2e20">${total||'·'}</td>`;
    h += `</tr>`;
  });

  // 出勤人数行
  h += `<tr style="background:#1a2e20">`;
  h += `<td colspan="2" style="padding:4px 6px;color:#7de8a8;font-weight:700;border:1px solid #2a4a30;font-size:.65rem">出勤人数</td>`;
  for(let d=startDay;d<=endDay;d++){
    const key=dk(y,m,d), dow=new Date(y,m,d).getDay();
    const isOpen = getDayOpen(key);
    if(!isOpen){
      h += `<td style="border:1px solid #2a4a30;text-align:center;color:#556655;font-size:.52rem">定休</td>`;
      continue;
    }
    const cnt = dd(key).assignments.filter(a=>a.role).length;
    h += `<td style="text-align:center;border:1px solid #2a4a30;padding:2px"><span style="font-size:.52rem;color:#7de8a8;display:block;line-height:1.3">${cnt}人</span></td>`;
  }
  h += `<td style="border:1px solid #2a4a30;text-align:center;color:#7de8a8;font-weight:700;font-size:.62rem">—</td>`;
  h += `</tr>`;
  h += `</tbody></table>`;
  return h;
}

function renderMonthly(){
  const y=curY, m=curM, daysIn=new Date(y,m+1,0).getDate();
  document.getElementById('monthlyTitle').textContent = `${y}年${m+1}月　月間出勤表`;

  const mid = Math.ceil(daysIn/2);

  let h = `<div id="monthlySummary" style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px">`;
  h += `<div style="font-size:.72rem;font-weight:700;color:var(--accent);margin-bottom:6px">📊 今月の出勤集計</div>`;
  h += `<div style="display:flex;flex-wrap:wrap;gap:5px">`;
  staff.forEach(s=>{
    const cnt=countDays(s.id), wkCnt=countWeekendDays(s.id), max=s.maxWeekendDays||8;
    const col=wkCnt>=max?'var(--red)':wkCnt>=max*0.8?'var(--gold)':'var(--accent)';
    h += `<div style="background:var(--surface2);border-radius:6px;padding:4px 9px;font-size:.68rem;border-left:3px solid ${col}">
      <span style="font-weight:600">${s.name}</span>
      <span style="color:var(--muted);margin-left:4px;font-size:.6rem">全${cnt}日</span>
      <span style="color:${col};font-weight:700;margin-left:4px">土日祝${wkCnt}</span><span style="color:var(--muted);font-size:.6rem">/${max}日</span>
    </div>`;
  });
  h += `</div></div>`;

  // 凡例
  h += `<div id="monthlyLegend" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;font-size:.65rem">`;
  ROLES.forEach(r=>{
    h += `<span style="background:${r.color}22;color:${r.color};padding:2px 9px;border-radius:4px;font-weight:700;border:1px solid ${r.color}44">${r.id}：${r.name}</span>`;
  });
  h += `<span style="background:#fff0f0;color:#cc4444;padding:2px 9px;border-radius:4px;border:1px solid #ffcccc">✕ 欠勤</span>`;
  h += `</div>`;

  h += `<div id="halfTable1" style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:14px;overflow-x:auto">`;
  h += `<div style="font-size:.75rem;font-weight:700;color:var(--accent);margin-bottom:8px">📅 前半　1日〜${mid}日　（${y}年${m+1}月）</div>`;
  h += buildHalfTable(y, m, 1, mid);
  h += `</div>`;

  h += `<div id="halfTable2" style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:14px;overflow-x:auto">`;
  h += `<div style="font-size:.75rem;font-weight:700;color:var(--accent);margin-bottom:8px">📅 後半　${mid+1}日〜${daysIn}日　（${y}年${m+1}月）</div>`;
  h += buildHalfTable(y, m, mid+1, daysIn);
  h += `</div>`;

  document.getElementById('monthlyBody').innerHTML = h;
}

function buildAvailCal(s){
  const y=curY, m=curM, n=new Date(y,m+1,0).getDate(), first=new Date(y,m,1).getDay();
  const DOW=['日','月','火','水','木','金','土'];
  if(!s.avail) s.avail={};
  const sid=s.id;
  let h = `<div class="acal-wrap" id="avail-${sid}">
    <div class="acal-hdr">
      <span class="acal-lbl">欠勤希望日</span>
      <div class="acal-btns">
        <button class="acal-btn ok" onclick="setAllAvail(${sid},true)">全日OK</button>
        <button class="acal-btn ng" onclick="setAllAvail(${sid},false)">全日NG</button>
        <button class="acal-btn rs" onclick="clearAvail(${sid})">リセット</button>
      </div>
    </div>
    <p style="font-size:.6rem;color:var(--muted);margin:3px 0 5px">緑=出勤OK　グレー=欠勤希望</p>
    <div class="acal-grid">`;
  DOW.forEach((dn,i)=>h+=`<div class="acal-dlbl ${i===0?'su':i===6?'sa':''}">${dn}</div>`);
  for(let i=0;i<first;i++) h+=`<div class="acal-empty"></div>`;
  for(let d=1;d<=n;d++){
    const key=dk(y,m,d), dow=new Date(y,m,d).getDay();
    const avail = s.avail[key]!==false;
    const sunsat = dow===0?'su':dow===6?'sa':'';
    h += `<div class="acal-day ${avail?'avail':'unavail'} ${sunsat}"
      onclick="toggleAvail(${sid},'${key}',this)">${d}</div>`;
  }
  h += `</div></div>`;
  return h;
}

function toggleAvail(sid, key, el){
  const s=gs(sid); if(!s) return;
  if(!s.avail) s.avail={};
  const cur = s.avail[key]!==false;
  s.avail[key] = !cur;
  el.className = el.className.replace(/avail|unavail/g,'').trim() + ' ' + (s.avail[key]?'avail':'unavail');
  el.style.background = s.avail[key]?'var(--accent)':'';
  renderCal();
}
function setAllAvail(sid, val){
  const s=gs(sid); if(!s) return;
  if(!s.avail) s.avail={};
  const n=new Date(curY,curM+1,0).getDate();
  for(let d=1;d<=n;d++) s.avail[dk(curY,curM,d)]=val;
  const wrap=document.getElementById('avail-'+sid);
  if(wrap) wrap.outerHTML=buildAvailCal(s);
  renderCal();
}
function clearAvail(sid){
  const s=gs(sid); if(!s) return;
  if(!s.avail) s.avail={};
  const n=new Date(curY,curM+1,0).getDate();
  for(let d=1;d<=n;d++) delete s.avail[dk(curY,curM,d)];
  const wrap=document.getElementById('avail-'+sid);
  if(wrap) wrap.outerHTML=buildAvailCal(s);
  renderCal();
}

function renderStaff(){
  document.getElementById('staffTitle').textContent = `${curY}年${curM+1}月　スタッフ設定`;
  const el = document.getElementById('staffCards');
  el.innerHTML = '';
  staff.forEach(s=>{
    const div = document.createElement('div');
    div.className = 'scard';
    div.setAttribute('draggable','true');
    div.dataset.staffId = s.id;
    const cnt=countDays(s.id), wkCnt=countWeekendDays(s.id), max=s.maxWeekendDays||8, pct=Math.min(100,Math.round(wkCnt/max*100));
    const bc = pct>=100?'var(--red)':pct>=80?'var(--gold)':'var(--accent)';

    // 役割バッジ
    const roleBadges = (s.roles||['H']).map(r=>`<span class="role-badge rb-${r}">${r}</span>`).join('');

    div.innerHTML = `
      <div class="scard-header">
        <span class="drag-handle" title="ドラッグして並び替え">☰</span>
        <div style="display:flex;flex-wrap:wrap;gap:2px">${roleBadges}</div>
        <input class="scname" value="${s.name}" onchange="updSt(${s.id},'name',this.value);renderCal()">
        <button class="delbtn" onclick="delStaff(${s.id})">削除</button>
      </div>
      <div class="sgrid3">
        <div>
          <label class="flbl">役割（複数可）</label>
          <div style="display:flex;flex-wrap:wrap;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:5px;">
            ${ROLES.map(r=>`<label style="font-size:.58rem;display:flex;align-items:center;gap:2px;cursor:pointer">
              <input type="checkbox" ${(s.roles||[]).includes(r.id)?'checked':''} onchange="toggleRoleCheck(${s.id},'${r.id}',this.checked)" style="width:11px;height:11px">
              <span style="color:${r.color};font-weight:700">${r.id}</span>
            </label>`).join('')}
          </div>
        </div>
        <div><label class="flbl">土日祝　最大日数</label><input type="number" class="finput" value="${s.maxWeekendDays||8}" min="1" max="20" onchange="updSt(${s.id},'maxWeekendDays',parseInt(this.value)||8)"></div>
        <div><label class="flbl">今月出勤（全/土日祝）</label>
          <div style="margin-top:3px;font-size:.75rem;font-weight:700;color:${bc}">${cnt}日 / 土日祝${wkCnt}日</div>
          <div style="background:var(--surface2);border-radius:3px;height:5px;overflow:hidden;margin-top:2px">
            <div style="width:${pct}%;height:100%;background:${bc};border-radius:3px"></div></div></div>
      </div>
      <div class="sgrid">
        <div><label class="flbl">☀ 出勤時刻</label><input type="time" class="finput" value="${s.defFrom||'09:00'}" onchange="updSt(${s.id},'defFrom',this.value)"></div>
        <div><label class="flbl">☀ 退勤時刻</label><input type="time" class="finput" value="${s.defTo||'16:00'}" onchange="updSt(${s.id},'defTo',this.value)"></div>
      </div>
      ${buildAvailCal(s)}`;

    div.addEventListener('dragstart', onDragStart);
    div.addEventListener('dragover', onDragOver);
    div.addEventListener('dragleave', onDragLeave);
    div.addEventListener('drop', onDrop);
    div.addEventListener('dragend', onDragEnd);
    el.appendChild(div);
  });
}

function toggleRoleCheck(id, role, checked){
  const s=gs(id); if(!s) return;
  if(!s.roles) s.roles=[];
  if(checked){ if(!s.roles.includes(role)) s.roles.push(role); }
  else { s.roles=s.roles.filter(r=>r!==role); }
}

function updSt(id, k, v){ const s=gs(id); if(s) s[k]=v; }
function addStaff(){
  staff.push({id:nextId++, name:'新スタッフ', roles:['H'], defFrom:'09:00', defTo:'16:00', avail:{}, maxWeekendDays:8});
  renderStaff(); updatePasteStaff(); renderCal();
}
function delStaff(id){
  if(!confirm('削除しますか？')) return;
  staff=staff.filter(s=>s.id!==id);
  renderStaff(); updatePasteStaff(); renderCal();
}

// Drag & Drop
function onDragStart(e){ dragSrc=this; this.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',this.dataset.staffId); }
function onDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; if(this!==dragSrc) this.classList.add('drag-over'); return false; }
function onDragLeave(){ this.classList.remove('drag-over'); }
function onDrop(e){
  e.stopPropagation(); e.preventDefault(); this.classList.remove('drag-over');
  if(this===dragSrc) return;
  const srcId=parseInt(dragSrc.dataset.staffId), tgtId=parseInt(this.dataset.staffId);
  const si=staff.findIndex(s=>s.id===srcId), ti=staff.findIndex(s=>s.id===tgtId);
  if(si<0||ti<0) return;
  const [moved]=staff.splice(si,1); staff.splice(ti,0,moved);
  renderStaff(); updatePasteStaff(); renderCal(); return false;
}
function onDragEnd(){ document.querySelectorAll('.scard').forEach(c=>c.classList.remove('dragging','drag-over')); dragSrc=null; }

// SAVE / LOAD（GAS同期）
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzVretuyWf7A5QZEdQM8D2gbHi24t_NWm5U1U00VmXqjziSNi4EWLqnBnefE9c-KjKS/exec';
// ↑ 別途Google Apps ScriptのURLを設定してください

function applyData(d){
  if(d.staff&&d.staff.length){ staff=d.staff; nextId=d.nextId||Math.max(...d.staff.map(s=>s.id))+1; }
  if(d.dayData) dayData=d.dayData;
  if(d.lineHistory) lineHistory=d.lineHistory;
  if(d.nextHistId) nextHistId=d.nextHistId;
}

async function syncSave(){
  const payload = JSON.stringify({staff, dayData, lineHistory, nextId, nextHistId});
  localStorage.setItem('cafeShift', payload);
  const st = document.getElementById('syncSt');
  st.textContent = '保存中...';
  try{
    await fetch(GAS_URL, {method:'POST', headers:{'Content-Type':'text/plain'}, redirect:'follow', body:payload});
    const now = new Date().toLocaleTimeString('ja-JP');
    st.textContent = `☁ 同期完了 ${now} ✓`;
    alert('✓ クラウドに保存・同期しました！');
  }catch(e){
    st.textContent = 'ローカルのみ保存';
    alert('⚠ クラウド保存に失敗しました。ローカルには保存済みです。');
  }
}

function loadLocal(){
  try{
    const d=JSON.parse(localStorage.getItem('cafeShift')||'{}');
    applyData(d);
  }catch(e){}
}

async function loadFromCloud(){
  const st = document.getElementById('syncSt');
  st.textContent = '読込中...';
  loadLocal();
  renderCal(); updatePasteStaff();
  try{
    const r=await fetch(GAS_URL+'?t='+Date.now(), {redirect:'follow', cache:'no-cache'});
    const text=await r.text();
    const start=text.indexOf('{'), end=text.lastIndexOf('}');
    if(start<0) throw new Error('no data');
    const d=JSON.parse(text.slice(start,end+1));
    if(d.staff&&d.staff.length){
      applyData(d);
      localStorage.setItem('cafeShift', JSON.stringify(d));
      renderCal(); updatePasteStaff();
      const now=new Date().toLocaleTimeString('ja-JP');
      st.textContent=`☁ 読込完了 ${now} ✓`;
    } else {
      st.textContent='初回：データなし';
    }
  }catch(e){
    st.textContent='ローカルデータ使用中';
  }
}
