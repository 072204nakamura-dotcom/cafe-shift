<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>洋食だいにんぐなかむら シフト管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f7f3ee;color:#2c1f12;min-height:100vh;}
:root{
  --accent:#8b4513;--gold:#c8962a;--green:#3d7a50;--red:#b83030;--blue:#2060a0;
  --bg:#f7f3ee;--surface:#fff;--surface2:#f0ead8;--border:#d8c9a8;--muted:#8a7055;
  --K:#4a7c3f;--H:#2060a0;
  --lunch:#d4820a;--dinner:#6040a0;--cafe:#a060c0;
}
.hdr{background:#2c1f12;color:#f7f3ee;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.logo{font-family:'Playfair Display',serif;font-size:1.1rem;color:#e8c870;letter-spacing:.05em;}
.logo-sub{font-size:.58rem;color:#8a7055;margin-left:6px;letter-spacing:.1em;}
.sync-btn{background:var(--green);border:none;color:#fff;padding:7px 14px;border-radius:7px;font-size:.78rem;font-family:inherit;cursor:pointer;}
.sync-st{font-size:.56rem;color:#8a7055;text-align:right;margin-top:2px;}
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);overflow-x:auto;}
.tab{flex:1;padding:10px 6px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:.72rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .2s;}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;}
.page{display:none;padding:14px;}
.page.on{display:block;}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.mtitle{font-family:'Playfair Display',serif;font-size:1rem;color:var(--accent);}
.nbtn{background:#fff;border:1px solid var(--border);color:#2c1f12;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.85rem;}
.irow{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.icard{flex:1;min-width:70px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 8px;border-top:3px solid var(--gold);}
.icard .lbl{font-size:.56rem;color:var(--muted);}
.icard .val{font-size:1.1rem;font-weight:700;font-family:'Playfair Display',serif;}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;font-size:.6rem;color:var(--muted);}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;}
/* CALENDAR */
.cal-wrap{overflow-x:auto;}
.cal{width:100%;border-collapse:separate;border-spacing:2px;min-width:320px;}
.cal th{font-size:.65rem;color:var(--muted);padding:3px;text-align:center;}
.cal th.su{color:var(--red);}
.cal th.sa{color:var(--blue);}
.cday{background:#fff;border:1px solid var(--border);border-radius:7px;padding:4px 3px;vertical-align:top;min-height:92px;cursor:pointer;transition:box-shadow .15s;}
.cday:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);}
.cday.empty{background:transparent;border-color:transparent;cursor:default;}
.cday.mon-closed{background:#f2ece0;opacity:.65;}
.cday.ok{border-color:rgba(61,122,80,.45);background:#f5fff6;}
.cday.ng{border-color:rgba(184,48,48,.4);background:#fff5f5;}
.cday.dinner-only{border-left:4px solid var(--dinner);background:#f8f5ff;}
.cday.today .dnum{background:var(--accent);color:#fff;border-radius:50%;}
.cday.su .dnum{color:var(--red);}
.cday.sa .dnum{color:var(--blue);}
.dtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;}
.dnum{width:19px;height:19px;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:500;flex-shrink:0;}
.hol-mark{font-size:.38rem;color:var(--red);display:block;line-height:1;text-align:center;}
.session-block{border-radius:4px;padding:2px 4px;margin-bottom:2px;font-size:.52rem;}
.session-block.lunch{background:rgba(212,130,10,.1);border-left:2px solid var(--lunch);}
.session-block.dinner{background:rgba(96,64,160,.1);border-left:2px solid var(--dinner);}
.session-block.closed-s{background:var(--surface2);color:var(--muted);border-left:2px solid #ccc;}
.session-label{font-weight:700;font-size:.5rem;}
.session-label.lunch{color:var(--lunch);}
.session-label.dinner{color:var(--dinner);}
.session-label.closed-s{color:var(--muted);}
.s-chips{display:flex;flex-wrap:wrap;gap:1px;margin-top:1px;}
.s-chip{font-size:.48rem;padding:0 3px;border-radius:4px;}
.s-chip.K{background:rgba(74,124,63,.18);color:var(--K);}
.s-chip.H{background:rgba(32,96,160,.18);color:var(--H);}
.s-alert{font-size:.48rem;color:var(--red);}
/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:18px;}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mtl{font-family:'Playfair Display',serif;font-size:1rem;color:var(--accent);}
.xbtn{background:var(--surface2);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1rem;}
.session-panel{border-radius:10px;margin-bottom:12px;overflow:hidden;border:1px solid var(--border);}
.session-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;}
.session-head.lunch{background:rgba(212,130,10,.12);}
.session-head.dinner{background:rgba(96,64,160,.12);}
.session-time{font-size:.75rem;font-weight:700;}
.session-time.lunch{color:var(--lunch);}
.session-time.dinner{color:var(--dinner);}
.stoggle{padding:5px 14px;border-radius:5px;border:1px solid var(--border);background:#fff;font-family:inherit;font-size:.78rem;cursor:pointer;}
.stoggle.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:700;}
.session-body{padding:10px 12px;background:#fff;}
.albl{font-size:.7rem;font-weight:500;color:var(--muted);margin-bottom:4px;}
.arows{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.arow{background:var(--surface2);border-radius:7px;padding:7px 9px;display:grid;grid-template-columns:7px 1fr auto;gap:7px;align-items:start;}
.arow.unav{opacity:.4;}
.adot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;margin-top:6px;}
.adot.K{background:var(--K);}
.adot.H{background:var(--H);}
.aname{font-size:.8rem;font-weight:500;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.atag{font-size:.56rem;padding:1px 5px;border-radius:7px;font-weight:700;}
.atag.K{background:rgba(74,124,63,.15);color:var(--K);}
.atag.H{background:rgba(32,96,160,.15);color:var(--H);}
.atag.KH{background:rgba(184,98,42,.15);color:var(--accent);}
.tov{display:flex;align-items:center;gap:3px;margin-top:3px;flex-wrap:wrap;}
.tovlbl{font-size:.58rem;color:var(--muted);}
.tovinput{font-size:.66rem;font-family:monospace;border:1px solid var(--border);border-radius:4px;padding:2px 4px;background:#fff;color:#2c1f12;width:64px;}
.rsel{font-size:.7rem;font-family:inherit;background:#fff;border:1px solid var(--border);border-radius:5px;padding:3px 4px;color:#2c1f12;cursor:pointer;min-width:88px;}
.malert{background:rgba(184,48,48,.08);border:1px solid rgba(184,48,48,.25);border-radius:6px;padding:6px 10px;font-size:.7rem;color:var(--red);margin-top:6px;}
.gantt{background:var(--surface2);border-radius:8px;padding:8px;margin-bottom:10px;overflow-x:auto;}
.gantt-title{font-size:.7rem;font-weight:700;color:var(--accent);margin-bottom:5px;}
.gaxis{display:flex;padding-left:60px;margin-bottom:2px;}
.gtick{flex:1;font-size:.48rem;color:var(--muted);font-family:monospace;}
.grow{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.gname{width:54px;font-size:.58rem;color:var(--muted);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.gtrack{flex:1;height:12px;background:#e8e0cc;border-radius:3px;position:relative;min-width:180px;border:1px solid var(--border);}
.gbar{position:absolute;height:100%;border-radius:3px;opacity:.75;}
.gline-l{position:absolute;top:0;bottom:0;width:1px;background:rgba(212,130,10,.7);}
.gline-d{position:absolute;top:0;bottom:0;width:1px;background:rgba(96,64,160,.7);}
/* LINE */
.pcard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.ptitle{font-size:.82rem;font-weight:700;color:var(--accent);margin-bottom:8px;}
.psel{width:100%;padding:7px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:#2c1f12;font-family:inherit;font-size:.8rem;margin-bottom:8px;}
.pta{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:#2c1f12;font-family:monospace;font-size:.72rem;min-height:80px;resize:vertical;margin-bottom:8px;}
.pbtn{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:10px;width:100%;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;}
.pbtn.g{background:var(--green);}
.pres{margin-top:8px;background:var(--surface2);border-radius:8px;padding:10px;font-size:.75rem;line-height:1.8;}
.tok{color:var(--green);} .terr{color:var(--red);}
.nbox{background:#f0f8e8;border:1px solid #a8d090;border-radius:8px;padding:12px;font-size:.72rem;white-space:pre-wrap;font-family:monospace;line-height:1.7;color:#1a3a10;margin-top:8px;}
.cbtn{background:#25d366;border:none;color:#fff;border-radius:7px;padding:9px;width:100%;font-family:inherit;font-size:.82rem;cursor:pointer;margin-top:7px;}
/* STAFF */
.scards{display:flex;flex-direction:column;gap:10px;}
.scard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.scard-header{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.scname{flex:1;font-size:.88rem;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);font-family:inherit;color:#2c1f12;min-width:120px;}
.delbtn{background:transparent;border:1px solid rgba(184,48,48,.4);color:var(--red);border-radius:5px;padding:4px 10px;cursor:pointer;font-size:.72rem;}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.flbl{font-size:.62rem;color:var(--muted);margin-bottom:2px;display:block;}
.finput,.fsel{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:5px;background:var(--surface2);color:#2c1f12;font-family:inherit;font-size:.75rem;}
.acal-wrap{margin-top:10px;}
.acal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.acal-lbl{font-size:.68rem;font-weight:700;color:var(--accent);}
.acal-btns{display:flex;gap:4px;}
.acal-btn{font-size:.6rem;padding:2px 7px;border-radius:4px;cursor:pointer;background:#fff;}
.acal-btn.ok{border:1px solid var(--green);color:var(--green);}
.acal-btn.ng{border:1px solid var(--red);color:var(--red);}
.acal-btn.rs{border:1px solid var(--border);color:var(--muted);}
.acal-grid{display:flex;flex-wrap:wrap;gap:3px;}
.acal-dlbl{width:28px;height:16px;font-size:.55rem;text-align:center;color:var(--muted);}
.acal-dlbl.su{color:var(--red);}
.acal-dlbl.sa{color:var(--blue);}
.acal-empty{width:28px;height:28px;}
.acal-day{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;}
.acal-day.avail{background:var(--green);color:#fff;}
.acal-day.unavail{background:var(--surface2);border-color:var(--border);}
.acal-day.su{color:var(--red);}
.acal-day.sa{color:var(--blue);}
.acal-day.avail.su,.acal-day.avail.sa{color:#fff;}
.cafe-section{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;border-top:4px solid var(--cafe);}
.cafe-title{font-size:.82rem;font-weight:700;color:var(--cafe);margin-bottom:10px;}
.addbtn{background:var(--surface2);border:1px dashed var(--border);color:var(--muted);border-radius:8px;padding:10px;width:100%;font-family:inherit;font-size:.82rem;cursor:pointer;margin-top:4px;}
@media print{
  .hdr,.tabs,.ov{display:none!important;}
  .page{display:none!important;}
  .page.print-target{display:block!important;}
  @page{size:A4 landscape;margin:8mm;}
}
</style>
</head>
<body>
<div class="hdr">
  <div><span class="logo">洋食だいにんぐ なかむら</span><span class="logo-sub">SHIFT</span></div>
  <div style="text-align:right">
    <button class="sync-btn" onclick="saveLocal()">💾 保存</button>
    <div class="sync-st" id="syncSt">未保存</div>
  </div>
</div>
<div class="tabs">
  <button class="tab on" onclick="showPage('cal',this)">📅 月間</button>
  <button class="tab" onclick="showPage('cafe',this)">☕ Cafe照</button>
  <button class="tab" onclick="showPage('line',this)">💬 LINE</button>
  <button class="tab" onclick="showPage('monthly',this)">📊 出勤表</button>
  <button class="tab" onclick="showPage('staff',this)">👤 スタッフ</button>
</div>

<!-- CALENDAR -->
<div class="page on" id="page-cal">
  <div class="mnav">
    <button class="nbtn" onclick="chMonth(-1)">◀</button>
    <div class="mtitle" id="calTitle"></div>
    <button class="nbtn" onclick="chMonth(1)">▶</button>
  </div>
  <div class="irow" id="infoRow"></div>
  <div class="legend">
    <span><span class="ldot" style="background:var(--green)"></span>ランチ＋ディナー</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-left:3px solid var(--dinner);background:#f8f5ff;margin-right:3px;vertical-align:middle"></span>ディナーのみ（Cafe照日）</span>
    <span><span class="ldot" style="background:var(--red)"></span>K/H不足</span>
    <span><span class="ldot" style="background:#ccc"></span>月曜定休</span>
  </div>
  <div class="cal-wrap"><table class="cal" id="calTable"></table></div>
</div>

<!-- CAFE照 -->
<div class="page" id="page-cafe">
  <div class="mnav">
    <button class="nbtn" onclick="chMonth(-1);renderCafe()">◀</button>
    <div class="mtitle" id="cafeTitle"></div>
    <button class="nbtn" onclick="chMonth(1);renderCafe()">▶</button>
  </div>
  <div class="cafe-section">
    <div class="cafe-title">☕ Cafe照 出勤日設定</div>
    <p style="font-size:.72rem;color:var(--muted);margin-bottom:8px;line-height:1.7">
      中村伴樹・中村紀子がCafe照に出勤する日をタップしてください。<br>
      <span style="color:var(--lunch);font-weight:700">🌞 ランチ（11:00〜15:00）は休業</span>、
      <span style="color:var(--dinner);font-weight:700">🌙 ディナー（18:00〜22:00）は営業</span>になります。
    </p>
    <div id="cafeCalBody"></div>
  </div>
  <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px">
    <div style="font-size:.78rem;font-weight:700;color:var(--accent);margin-bottom:8px">📋 今月サマリー</div>
    <div id="cafeSummary"></div>
  </div>
</div>

<!-- LINE -->
<div class="page" id="page-line">
  <div class="pcard">
    <div class="ptitle">📋 欠勤希望収集メッセージを生成</div>
    <button class="pbtn g" onclick="genReqMsg()">来月のメッセージを生成</button>
    <div id="reqMsgRes"></div>
  </div>
  <div class="pcard">
    <div class="ptitle">💬 欠勤希望日を貼り付け登録</div>
    <label class="flbl">スタッフを選択</label>
    <select class="psel" id="pasteStaff"></select>
    <label class="flbl">LINEのテキストをそのまま貼り付け</label>
    <textarea class="pta" id="pasteTxt" placeholder="例：5日、13日、20日"></textarea>
    <button class="pbtn" onclick="parseLine()">📅 カレンダーに反映</button>
    <div id="parseRes"></div>
  </div>
  <div class="pcard">
    <div class="ptitle">📤 前日通知メッセージを生成</div>
    <label class="flbl">通知する日付</label>
    <input type="date" class="psel" id="noticeDate" style="margin-bottom:8px">
    <button class="pbtn g" onclick="genNotice()">前日通知を生成</button>
    <div id="noticeRes"></div>
  </div>
</div>

<!-- MONTHLY -->
<div class="page" id="page-monthly">
  <div class="mnav">
    <button class="nbtn" onclick="chMonth(-1);renderMonthly()">◀</button>
    <div class="mtitle" id="monthlyTitle"></div>
    <button class="nbtn" onclick="chMonth(1);renderMonthly()">▶</button>
  </div>
  <div style="text-align:right;margin-bottom:10px">
    <button class="nbtn" onclick="printMonthly()" style="font-size:.72rem;background:var(--green);color:#fff;border-color:var(--green)">🖨 印刷・PDF</button>
  </div>
  <div id="monthlyBody"></div>
</div>

<!-- STAFF -->
<div class="page" id="page-staff">
  <div class="mnav" style="margin-bottom:10px">
    <button class="nbtn" onclick="chMonth(-1);renderStaff()">◀</button>
    <div class="mtitle" id="staffTitle"></div>
    <button class="nbtn" onclick="chMonth(1);renderStaff()">▶</button>
  </div>
  <div class="scards" id="staffCards"></div>
  <button class="addbtn" onclick="addStaff()">＋ スタッフを追加</button>
</div>

<!-- MODAL -->
<div class="ov" id="ov" onclick="closeBg(event)">
  <div class="modal">
    <div class="mhdr">
      <div class="mtl" id="modalTitle"></div>
      <button class="xbtn" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const ROLES=[
  {id:'K',name:'調理補助',color:'#4a7c3f',must:true},
  {id:'H',name:'ホールサービス',color:'#2060a0',must:true},
];
const SESSIONS={
  lunch:{id:'lunch',label:'ランチ',emoji:'🌞',timeLabel:'11:00〜15:00',from:'11:00',to:'15:00',color:'#d4820a'},
  dinner:{id:'dinner',label:'ディナー',emoji:'🌙',timeLabel:'18:00〜22:00',from:'18:00',to:'22:00',color:'#6040a0'},
};
const JP_HOL=new Set(['2025-01-01','2025-01-13','2025-02-11','2025-02-23','2025-02-24','2025-03-20','2025-04-29','2025-05-03','2025-05-04','2025-05-05','2025-05-06','2025-07-21','2025-08-11','2025-09-15','2025-09-22','2025-09-23','2025-10-13','2025-11-03','2025-11-23','2025-11-24','2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29','2026-05-03','2026-05-04','2026-05-05']);

let staff=[],dayData={},cafeShiftDays={};
let curY=new Date().getFullYear(),curM=new Date().getMonth(),nextId=1;

function dk(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function gs(id){return staff.find(s=>s.id===id);}
function dd(key){
  if(!dayData[key]) dayData[key]={lunchOpen:true,dinnerOpen:true,lunch:{assignments:[]},dinner:{assignments:[]}};
  const d=dayData[key];
  if(d.lunchOpen===undefined) d.lunchOpen=true;
  if(d.dinnerOpen===undefined) d.dinnerOpen=true;
  if(!d.lunch) d.lunch={assignments:[]};
  if(!d.dinner) d.dinner={assignments:[]};
  if(!d.lunch.assignments) d.lunch.assignments=[];
  if(!d.dinner.assignments) d.dinner.assignments=[];
  return d;
}
function isAvail(s,key){return s.avail[key]!==false;}
function isCafeDay(key){const cd=cafeShiftDays[key];return !!(cd&&(cd.tomoki||cd.noriko));}

// 営業パターン: 'none' | 'lunch_only' | 'dinner_only' | 'both'
function getDayPattern(key){
  const dow=new Date(key).getDay();
  if(dow===1) return 'none';
  const data=dd(key);
  const lunchForced=isCafeDay(key); // Cafe照日はランチ強制休業
  const lOpen=!lunchForced&&data.lunchOpen;
  const dOpen=data.dinnerOpen;
  if(lOpen&&dOpen) return 'both';
  if(lOpen&&!dOpen) return 'lunch_only';
  if(!lOpen&&dOpen) return 'dinner_only';
  return 'none';
}

function sessionAssign(key,sess){
  return dd(key)[sess].assignments.filter(a=>a.role).map(a=>({...a,s:gs(a.staffId)})).filter(x=>x.s);
}
function checkRoles(key,sess){
  const covered=new Set(sessionAssign(key,sess).map(a=>a.role));
  return ROLES.filter(r=>r.must&&!covered.has(r.id)).map(r=>r.id);
}
function countDays(staffId){
  const n=new Date(curY,curM+1,0).getDate();
  let c=0;
  for(let d=1;d<=n;d++){
    const k=dk(curY,curM,d),pat=getDayPattern(k),data=dd(k);
    if(pat==='none') continue;
    const inL=(pat==='both'||pat==='lunch_only')&&data.lunch.assignments.some(a=>a.staffId===staffId&&a.role);
    const inD=(pat==='both'||pat==='dinner_only')&&data.dinner.assignments.some(a=>a.staffId===staffId&&a.role);
    if(inL||inD) c++;
  }
  return c;
}

function chMonth(d){curM+=d;if(curM<0){curM=11;curY--;}if(curM>11){curM=0;curY++;}renderCal();}

function renderCal(){
  document.getElementById('calTitle').textContent=`${curY}年 ${curM+1}月`;
  const y=curY,m=curM,first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const todayK=dk(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  let totalOpen=0,totalMiss=0;
  let h='<thead><tr>';
  ['日','月','火','水','木','金','土'].forEach((dn,i)=>h+=`<th class="${i===0?'su':i===6?'sa':''}">${dn}</th>`);
  h+='</tr></thead><tbody><tr>';
  for(let i=0;i<first;i++) h+='<td class="cday empty"></td>';
  let col=first;
  for(let d=1;d<=days;d++){
    const key=dk(y,m,d),dow=new Date(y,m,d).getDay(),isHol=JP_HOL.has(key),pat=getDayPattern(key);
    const sunsat=dow===0?'su':dow===6?'sa':'';
    let anyMiss=false;
    if(pat==='both'||pat==='lunch_only') if(checkRoles(key,'lunch').length) anyMiss=true;
    if(pat==='both'||pat==='dinner_only') if(checkRoles(key,'dinner').length) anyMiss=true;
    if(pat!=='none') totalOpen++;
    if(anyMiss) totalMiss++;
    let cls=`cday ${sunsat} ${key===todayK?'today':''}`;
    if(pat==='none') cls+=' mon-closed';
    else if(anyMiss) cls+=' ng';
    else if(pat==='dinner_only') cls+=' dinner-only';
    else cls+=' ok';
    h+=`<td class="${cls}" onclick="openModal('${key}',${d})">`;
    h+=`<div class="dtop"><span class="dnum">${d}${isHol?'<span class="hol-mark">祝</span>':''}</span>`;
    h+=`<span style="font-size:.44rem;color:${pat==='none'?'var(--muted)':pat==='dinner_only'?'var(--cafe)':'var(--green)'}">${pat==='none'?'休':pat==='dinner_only'?'夜':pat==='lunch_only'?'昼':'営業'}</span></div>`;
    if(pat==='none'){
      h+=`<div style="font-size:.5rem;color:var(--muted);margin-top:4px">${dow===1?'月曜定休':'休業'}</div>`;
    } else {
      if(pat==='both'||pat==='lunch_only'){
        const la=sessionAssign(key,'lunch'),lm=checkRoles(key,'lunch');
        h+=`<div class="session-block lunch"><span class="session-label lunch">🌞ランチ</span>`;
        if(la.length){h+=`<div class="s-chips">`;la.forEach(a=>h+=`<span class="s-chip ${a.role}">${a.s.name.slice(-2)} ${a.role}</span>`);h+=`</div>`;}
        if(lm.length) h+=`<div class="s-alert">⚠${lm.join('・')}</div>`;
        h+=`</div>`;
      } else {
        h+=`<div class="session-block closed-s"><span class="session-label closed-s">🌞ランチ休</span></div>`;
      }
      if(pat==='both'||pat==='dinner_only'){
        const da=sessionAssign(key,'dinner'),dm=checkRoles(key,'dinner');
        h+=`<div class="session-block dinner"><span class="session-label dinner">🌙ディナー</span>`;
        if(da.length){h+=`<div class="s-chips">`;da.forEach(a=>h+=`<span class="s-chip ${a.role}">${a.s.name.slice(-2)} ${a.role}</span>`);h+=`</div>`;}
        if(dm.length) h+=`<div class="s-alert">⚠${dm.join('・')}</div>`;
        h+=`</div>`;
      }
    }
    h+='</td>';
    col++;
    if(col%7===0&&d<days) h+='</tr><tr>';
  }
  while(col%7!==0){h+='<td class="cday empty"></td>';col++;}
  h+='</tr></tbody>';
  document.getElementById('calTable').innerHTML=h;
  document.getElementById('infoRow').innerHTML=`
    <div class="icard"><div class="lbl">営業日数</div><div class="val" style="color:var(--green)">${totalOpen}</div></div>
    <div class="icard"><div class="lbl">要確認日</div><div class="val" style="color:var(--red)">${totalMiss}</div></div>
    <div class="icard"><div class="lbl">スタッフ</div><div class="val">${staff.length}</div></div>`;
}

function toggleSession(key,sess,btn){
  if(sess==='lunch'&&isCafeDay(key)) return;
  const data=dd(key),field=sess==='lunch'?'lunchOpen':'dinnerOpen';
  data[field]=!data[field];
  btn.className='stoggle '+(data[field]?'on':'');

}
function buildAssignRows(key,sess){
  const sData=dd(key)[sess],S=SESSIONS[sess];
  const avail=staff.filter(s=>isAvail(s,key)),unavail=staff.filter(s=>!isAvail(s,key));
  let h=`<div class="albl">出勤スタッフを設定</div><div class="arows">`;
  avail.forEach(s=>{
    const asgn=sData.assignments.find(a=>a.staffId===s.id);
    const curRole=(asgn&&asgn.role)||'';
    const curFrom=(asgn&&asgn.timeFrom)||s.defFrom||S.from;
    const curTo=(asgn&&asgn.timeTo)||s.defTo||S.to;
    const roleTag=s.roles.includes('K')&&s.roles.includes('H')?'KH':s.roles[0]||'H';
    h+=`<div class="arow"><div class="adot ${curRole}" id="dot-${sess}-${s.id}"></div>
      <div>
        <div class="aname"><span class="atag ${roleTag}">${roleTag}</span>${s.name}
          <span style="font-size:.58rem;color:var(--muted)">${countDays(s.id)}/${s.maxDays||20}日</span></div>
        <div class="tov"><span class="tovlbl">出:</span>
          <input type="time" class="tovinput" value="${curFrom}" onchange="setTime('${key}','${sess}',${s.id},'timeFrom',this.value)">
          <span class="tovlbl">〜</span>
          <input type="time" class="tovinput" value="${curTo}" onchange="setTime('${key}','${sess}',${s.id},'timeTo',this.value)">
        </div>
      </div>
      <select class="rsel" onchange="setRole('${key}','${sess}',${s.id},this.value)">
        <option value="" ${!curRole?'selected':''}>― 休み</option>
        ${ROLES.filter(r=>s.roles.includes(r.id)||(s.roles.includes('K')&&s.roles.includes('H'))).map(r=>`<option value="${r.id}" ${curRole===r.id?'selected':''}>${r.id}：${r.name}</option>`).join('')}
      </select></div>`;
  });
  h+='</div>';
  if(unavail.length){h+=`<div class="albl" style="color:var(--red)">欠勤希望</div><div class="arows">`;unavail.forEach(s=>h+=`<div class="arow unav"><div class="adot"></div><div><div class="aname">${s.name}</div></div><span style="font-size:.62rem;color:var(--red)">欠勤</span></div>`);h+='</div>';}
  return h;
}
function buildGantt(key,pat){
  const sH=9,eH=22,total=(eH-sH)*60,tMin=t=>t.split(':').reduce((h,m)=>h*60+parseInt(m),0);
  let all=[];
  if(pat==='both'||pat==='lunch_only') dd(key).lunch.assignments.filter(a=>a.role).forEach(a=>all.push({...a,sess:'lunch'}));
  if(pat==='both'||pat==='dinner_only') dd(key).dinner.assignments.filter(a=>a.role).forEach(a=>all.push({...a,sess:'dinner'}));
  if(!all.length) return '';
  let h='<div class="gantt"><div class="gantt-title">⏱ タイムスケジュール（9〜22時）</div><div class="gaxis">';
  for(let i=sH;i<=eH;i++) h+=`<div class="gtick">${i}</div>`;
  h+='</div>';
  all.forEach(a=>{
    const s=gs(a.staffId);if(!s)return;
    const S=SESSIONS[a.sess],from=a.timeFrom||s.defFrom||S.from,to=a.timeTo||s.defTo||S.to;
    const left=((tMin(from)-sH*60)/total*100).toFixed(1),width=((tMin(to)-tMin(from))/total*100).toFixed(1);
    const l15=((tMin('15:00')-sH*60)/total*100).toFixed(1),l18=((tMin('18:00')-sH*60)/total*100).toFixed(1);
    const ro=ROLES.find(r=>r.id===a.role);
    h+=`<div class="grow"><div class="gname">${s.name.slice(-2)}<span style="font-size:.44rem;color:${S.color}">${a.sess==='lunch'?'昼':'夜'}</span></div>
      <div class="gtrack"><div class="gbar" style="left:${left}%;width:${width}%;background:${ro?ro.color:S.color}"></div>
        <div class="gline-l" style="left:${l15}%"></div><div class="gline-d" style="left:${l18}%"></div>
      </div></div>`;
  });
  h+='</div>';return h;
}
function setRole(key,sess,staffId,role){
  const data=dd(key)[sess];
  if(!role){data.assignments=data.assignments.filter(x=>x.staffId!==staffId);}
  else{let a=data.assignments.find(x=>x.staffId===staffId);if(!a){a={staffId,role:'',timeFrom:null,timeTo:null};data.assignments.push(a);}a.role=role;}
  const dot=document.getElementById(`dot-${sess}-${staffId}`);if(dot)dot.className='adot '+(role||'');
  const g=document.querySelector('.gantt');if(g)g.outerHTML=buildGantt(key,getDayPattern(key));
  renderCal();
}
function setTime(key,sess,staffId,field,val){
  const data=dd(key)[sess];let a=data.assignments.find(x=>x.staffId===staffId);
  if(!a){a={staffId,role:'',timeFrom:null,timeTo:null};data.assignments.push(a);}a[field]=val;renderCal();
}

function buildCafeMiniCal(y,m,n,first,person){
  const DOW=['日','月','火','水','木','金','土'];
  let h=`<div style="display:flex;flex-wrap:wrap;gap:3px">`;
  DOW.forEach((dn,i)=>h+=`<div style="width:30px;height:16px;font-size:.55rem;text-align:center;color:${i===0?'var(--red)':i===6?'var(--blue)':'var(--muted)'}">${dn}</div>`);
  for(let i=0;i<first;i++) h+=`<div style="width:30px;height:30px"></div>`;
  for(let d=1;d<=n;d++){
    const key=dk(y,m,d),dow=new Date(y,m,d).getDay(),cd=cafeShiftDays[key]||{},isOn=cd[person]||false,isMon=dow===1;
    const tc=dow===0?'var(--red)':dow===6?'var(--blue)':'#2c1f12';
    h+=`<div onclick="toggleCafeDay('${key}','${person}',this)" style="width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:500;cursor:${isMon?'default':'pointer'};border:1px solid ${isOn?'var(--cafe)':isMon?'#e0d8c8':'var(--border)'};background:${isOn?'var(--cafe)':isMon?'#f4f0e8':''};color:${isOn?'#fff':tc};opacity:${isMon?.45:1}">${d}</div>`;
  }
  h+='</div>';return h;
}
function toggleCafeDay(key,person,el){
  if(new Date(key).getDay()===1) return;
  if(!cafeShiftDays[key]) cafeShiftDays[key]={};
  cafeShiftDays[key][person]=!cafeShiftDays[key][person];
  const isOn=cafeShiftDays[key][person];
  el.style.background=isOn?'var(--cafe)':'';el.style.borderColor=isOn?'var(--cafe)':'var(--border)';el.style.color=isOn?'#fff':'#2c1f12';
  // Cafe照出勤日はランチ強制休業にする
  if(isCafeDay(key)) dd(key).lunchOpen=false;
  else {const data=dd(key);if(!data.lunchOpen) data.lunchOpen=true;}
  renderCafe();
}

// LINE
function updatePasteStaff(){document.getElementById('pasteStaff').innerHTML=staff.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');}
function parseLine(){
  const sid=parseInt(document.getElementById('pasteStaff').value),txt=document.getElementById('pasteTxt').value.trim();
  const res=document.getElementById('parseRes');
  if(!txt){res.innerHTML='<div class="pres terr">テキストを入力してください</div>';return;}
  const s=gs(sid);if(!s)return;
  const daysIn=new Date(curY,curM+1,0).getDate(),unav=new Set();
  txt.split('\n').forEach(line=>{
    for(const mm of line.matchAll(/([0-9]{1,2})[日]?\s*[〜~\-]\s*([0-9]{1,2})日?/g)){for(let d=parseInt(mm[1]);d<=parseInt(mm[2]);d++) if(d>=1&&d<=daysIn) unav.add(d);}
    for(const mm of line.matchAll(/([0-9]{1,2})日/g)){const d=parseInt(mm[1]);if(d>=1&&d<=daysIn)unav.add(d);}
    for(const mm of line.matchAll(/(?<![0-9])([1-9]|[12][0-9]|3[01])(?![0-9日])/g)){const d=parseInt(mm[1]);if(d>=1&&d<=daysIn)unav.add(d);}
  });
  if(!unav.size){res.innerHTML='<div class="pres terr">日付が読み取れませんでした</div>';return;}
  const arr=[...unav].sort((a,b)=>a-b);arr.forEach(d=>{s.avail[dk(curY,curM,d)]=false;});
  renderCal();
  res.innerHTML=`<div class="pres"><span class="tok">✓ ${s.name}さんの欠勤を登録</span><br>欠勤：<span style="color:var(--red)">${arr.join('・')}日</span></div>`;
}

function genNotice(){

}

  document.getElementById('monthlyTitle').textContent=`${y}年${m+1}月　月間出勤表`;
  let h=`<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px"><div style="display:flex;flex-wrap:wrap;gap:6px">`;
  staff.forEach(s=>{const cnt=countDays(s.id),max=s.maxDays||20;h+=`<div style="background:var(--surface2);border-radius:6px;padding:5px 8px;font-size:.68rem"><div style="font-weight:500">${s.name}</div><div style="font-weight:700;color:${cnt>=max?'var(--red)':'var(--green)'}">${cnt}<span style="color:var(--muted);font-weight:400">/${max}日</span></div></div>`;});
  h+='</div></div>';
  h+=`<div style="overflow-x:auto"><table style="border-collapse:collapse;font-size:.6rem;min-width:${daysIn*22+140}px;width:100%">`;
  // ヘッダー
  h+=`<thead><tr><th style="background:var(--surface2);padding:4px 8px;text-align:left;position:sticky;left:0;min-width:90px;border:1px solid var(--border)">スタッフ</th>`;
  h+=`<th style="background:var(--surface2);padding:3px;text-align:center;border:1px solid var(--border);min-width:24px;font-size:.55rem">区分</th>`;
  for(let d=1;d<=daysIn;d++){
    const key=dk(y,m,d),dow=new Date(y,m,d).getDay(),isH=JP_HOL.has(key);
    const col=dow===0||isH?'var(--red)':dow===6?'var(--blue)':'inherit';
    h+=`<th style="background:var(--surface2);padding:2px 1px;text-align:center;border:1px solid var(--border);min-width:22px;color:${col}">${d}<br><span style="font-size:.46rem">${DOW[dow]}</span></th>`;
  }
  h+=`<th style="background:var(--surface2);padding:4px;text-align:center;border:1px solid var(--border);min-width:28px">計</th></tr></thead><tbody>`;
  staff.forEach(s=>{
    let tL=0,tD=0;
    // ランチ行
    h+=`<tr><td rowspan="2" style="background:var(--surface2);padding:4px 8px;font-weight:500;position:sticky;left:0;border:1px solid var(--border);white-space:nowrap;vertical-align:middle;font-size:.68rem">${s.name}</td>`;
    h+=`<td style="background:rgba(212,130,10,.12);padding:2px 3px;text-align:center;border:1px solid var(--border);font-size:.5rem;font-weight:700;color:var(--lunch);white-space:nowrap">🌞昼</td>`;
    for(let d=1;d<=daysIn;d++){
      const key=dk(y,m,d),pat=getDayPattern(key),dow=new Date(y,m,d).getDay();
      const lOn=pat==='both'||pat==='lunch_only';
      if(dow===1){h+=`<td style="background:rgba(0,0,0,.04);border:1px solid var(--border)"></td>`;continue;}
      if(!lOn&&isCafeDay(key)){h+=`<td style="background:rgba(160,96,192,.08);text-align:center;border:1px solid var(--border);font-size:.5rem;color:var(--cafe)">☕</td>`;continue;}
      if(!lOn){h+=`<td style="background:rgba(0,0,0,.03);border:1px solid var(--border)"></td>`;continue;}
      const asgn=dd(key).lunch.assignments.find(a=>a.staffId===s.id&&a.role);
      if(asgn){tL++;const ro=ROLES.find(r=>r.id===asgn.role);h+=`<td style="text-align:center;padding:1px;border:1px solid var(--border);background:${ro?ro.color+'22':''};font-weight:700;color:${ro?ro.color:'var(--green)'};font-size:.62rem">${asgn.role}</td>`;}
      else if(!isAvail(s,key)){h+=`<td style="text-align:center;border:1px solid var(--border);background:rgba(184,48,48,.07);color:var(--red);font-size:.6rem">✕</td>`;}
      else{h+=`<td style="text-align:center;border:1px solid var(--border);color:#ddd;font-size:.6rem">·</td>`;}
    }
    h+=`<td rowspan="2" style="text-align:center;padding:2px;border:1px solid var(--border);background:var(--surface2);font-weight:700;vertical-align:middle;font-size:.68rem;color:${(tL+tD)>0?'var(--green)':'var(--muted)'}">—</td></tr>`;
    // ディナー行
    h+=`<tr><td style="background:rgba(96,64,160,.12);padding:2px 3px;text-align:center;border:1px solid var(--border);font-size:.5rem;font-weight:700;color:var(--dinner);white-space:nowrap">🌙夜</td>`;
    for(let d=1;d<=daysIn;d++){
      const key=dk(y,m,d),pat=getDayPattern(key),dow=new Date(y,m,d).getDay();
      const dOn=pat==='both'||pat==='dinner_only';
      if(dow===1){h+=`<td style="background:rgba(0,0,0,.04);border:1px solid var(--border)"></td>`;continue;}
      if(!dOn){h+=`<td style="background:rgba(0,0,0,.03);border:1px solid var(--border)"></td>`;continue;}
      const asgn=dd(key).dinner.assignments.find(a=>a.staffId===s.id&&a.role);
      if(asgn){tD++;const ro=ROLES.find(r=>r.id===asgn.role);h+=`<td style="text-align:center;padding:1px;border:1px solid var(--border);background:${ro?ro.color+'22':''};font-weight:700;color:${ro?ro.color:'var(--green)'};font-size:.62rem">${asgn.role}</td>`;}
      else if(!isAvail(s,key)){h+=`<td style="text-align:center;border:1px solid var(--border);background:rgba(184,48,48,.07);color:var(--red);font-size:.6rem">✕</td>`;}
      else{h+=`<td style="text-align:center;border:1px solid var(--border);color:#ddd;font-size:.6rem">·</td>`;}
    }
    h+=`</tr>`;
  });
  // 人数行
  h+=`<tr style="background:#2c1f12"><td colspan="2" style="padding:4px 8px;color:#f7f3ee;font-weight:500;position:sticky;left:0;background:#2c1f12;border:1px solid #444;font-size:.62rem">人数</td>`;
  for(let d=1;d<=daysIn;d++){
    const key=dk(y,m,d),pat=getDayPattern(key),dow=new Date(y,m,d).getDay();
    if(dow===1){h+=`<td style="border:1px solid #444;text-align:center;color:#555;font-size:.55rem">休</td>`;continue;}
    const lOn=pat==='both'||pat==='lunch_only',dOn=pat==='both'||pat==='dinner_only';
    const lCnt=dd(key).lunch.assignments.filter(a=>a.role).length,dCnt=dd(key).dinner.assignments.filter(a=>a.role).length;
    let cell='';
    if(lOn) cell+=`<span style="font-size:.48rem;color:#c0e8a0;display:block">${lCnt}</span>`;
    if(dOn) cell+=`<span style="font-size:.48rem;color:#c0a8ff;display:block">${dCnt}</span>`;
    if(!lOn&&!dOn) cell='<span style="color:#555">—</span>';
    h+=`<td style="text-align:center;border:1px solid #444;font-weight:700">${cell}</td>`;
  }
  h+=`<td style="border:1px solid #444;text-align:center;color:#f7f3ee;font-weight:700;font-size:.62rem">${staff.reduce((acc,s)=>acc+countDays(s.id),0)}</td></tr>`;
  h+=`</tbody></table></div>`;
  h+=`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;font-size:.62rem;color:var(--muted)">`;
  ROLES.forEach(r=>h+=`<span><b style="color:${r.color}">${r.id}</b> ${r.name}</span>`);
  h+=`<span><b style="color:var(--red)">✕</b> 欠勤</span><span><b style="color:var(--cafe)">☕</b> Cafe照日（ランチ休）</span>`;
  h+=`<span style="color:var(--lunch)">🌞昼行</span> / <span style="color:var(--dinner)">🌙夜行</span>（各スタッフで2行）</div>`;
  document.getElementById('monthlyBody').innerHTML=h;
}
function printMonthly(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('print-target'));
  document.getElementById('page-monthly').classList.add('print-target');
  setTimeout(()=>{window.print();setTimeout(()=>document.querySelectorAll('.page').forEach(p=>p.classList.remove('print-target')),1000);},300);
}

// STAFF
function buildAvailCal(s){
  const y=curY,m=curM,n=new Date(y,m+1,0).getDate(),first=new Date(y,m,1).getDay(),DOW=['日','月','火','水','木','金','土'];
  let h=`<div class="acal-wrap"><div class="acal-hdr"><span class="acal-lbl">📅 出勤可能日</span><div class="acal-btns">
    <button class="acal-btn ok" onclick="setAllAvail(${s.id},true)">全日OK</button>
    <button class="acal-btn ng" onclick="setAllAvail(${s.id},false)">全日NG</button>
    <button class="acal-btn rs" onclick="clearAvail(${s.id})">リセット</button>
  </div></div><div class="acal-grid">`;
  DOW.forEach((dn,i)=>h+=`<div class="acal-dlbl ${i===0?'su':i===6?'sa':''}">${dn}</div>`);
  for(let i=0;i<first;i++) h+=`<div class="acal-empty"></div>`;
  for(let d=1;d<=n;d++){
    const key=dk(y,m,d),dow=new Date(y,m,d).getDay(),avail=isAvail(s,key);
    h+=`<div class="acal-day ${avail?'avail':'unavail'} ${dow===0?'su':dow===6?'sa':''}" onclick="toggleAvail(${s.id},'${key}',this)">${d}</div>`;
  }
  h+=`</div></div>`;return h;
}
function toggleAvail(sid,key,el){const s=gs(sid);if(!s)return;s.avail[key]=!isAvail(s,key);el.className=`acal-day ${s.avail[key]?'avail':'unavail'} ${el.className.includes('su')?'su':el.className.includes('sa')?'sa':''}`;renderCal();}
function setAllAvail(sid,val){const s=gs(sid);if(!s)return;const n=new Date(curY,curM+1,0).getDate();for(let d=1;d<=n;d++)s.avail[dk(curY,curM,d)]=val;const el=document.getElementById('avail-'+sid);if(el)el.outerHTML=buildAvailCal(s);renderCal();}
function clearAvail(sid){const s=gs(sid);if(!s)return;const n=new Date(curY,curM+1,0).getDate();for(let d=1;d<=n;d++)delete s.avail[dk(curY,curM,d)];const el=document.getElementById('avail-'+sid);if(el)el.outerHTML=buildAvailCal(s);renderCal();}
function renderStaff(){
  document.getElementById('staffTitle').textContent=`${curY}年${curM+1}月　スタッフ設定`;
  const el=document.getElementById('staffCards');el.innerHTML='';
  staff.forEach(s=>{
    const div=document.createElement('div');div.className='scard';
    const cnt=countDays(s.id),max=s.maxDays||20,pct=Math.min(100,Math.round(cnt/max*100));
    const bc=pct>=100?'var(--red)':pct>=80?'var(--gold)':'var(--green)';
    const roleTag=s.roles.includes('K')&&s.roles.includes('H')?'KH':s.roles[0]||'H';
    div.innerHTML=`<div class="scard-header">
        <span class="atag ${roleTag}" style="font-size:.72rem">${roleTag}</span>
        <input class="scname" value="${s.name}" onchange="updSt(${s.id},'name',this.value);renderCal()">
        <button class="delbtn" onclick="delStaff(${s.id})">削除</button></div>
      <div class="sgrid">
        <div><label class="flbl">役割</label>
          <select class="fsel" onchange="updRole(${s.id},this.value)">
            <option value="H" ${roleTag==='H'?'selected':''}>H：ホールサービス</option>
            <option value="K" ${roleTag==='K'?'selected':''}>K：調理補助</option>
            <option value="KH" ${roleTag==='KH'?'selected':''}>KH：両方可</option>
          </select></div>
        <div><label class="flbl">基本 出勤</label><input type="time" class="finput" value="${s.defFrom||'11:00'}" onchange="updSt(${s.id},'defFrom',this.value)"></div>
        <div><label class="flbl">基本 退勤</label><input type="time" class="finput" value="${s.defTo||'22:00'}" onchange="updSt(${s.id},'defTo',this.value)"></div>
      </div>
      <div style="margin-bottom:8px"><label class="flbl">今月出勤: ${cnt}/${max}日</label>
        <div style="background:var(--surface2);border-radius:4px;height:8px;overflow:hidden;margin-top:4px">
          <div style="width:${pct}%;height:100%;background:${bc};border-radius:4px"></div></div></div>
      <div id="avail-${s.id}">${buildAvailCal(s)}</div>`;
    el.appendChild(div);
  });
}
function updRole(id,val){const s=gs(id);if(!s)return;s.roles=val==='KH'?['K','H']:[val];}
function updSt(id,k,v){const s=gs(id);if(s)s[k]=v;}
function addStaff(){staff.push({id:nextId++,name:'新スタッフ',roles:['H'],defFrom:'11:00',defTo:'22:00',avail:{},maxDays:20});renderStaff();updatePasteStaff();renderCal();}
function delStaff(id){if(!confirm('削除しますか？'))return;staff=staff.filter(s=>s.id!==id);renderStaff();updatePasteStaff();renderCal();}

// SAVE/LOAD
function saveLocal(){localStorage.setItem('nakamuraShift3',JSON.stringify({staff,dayData,cafeShiftDays}));const now=new Date().toLocaleTimeString('ja-JP');document.getElementById('syncSt').textContent=`保存完了 ${now} ✓`;alert('✓ 保存しました！');}
function loadLocal(){try{const d=JSON.parse(localStorage.getItem('nakamuraShift3')||'{}');if(d.staff&&d.staff.length){staff=d.staff;nextId=Math.max(...staff.map(s=>s.id))+1;}if(d.dayData)dayData=d.dayData;if(d.cafeShiftDays)cafeShiftDays=d.cafeShiftDays;}catch(e){}}

// TABS & INIT
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  if(btn)btn.classList.add('on');
  if(name==='staff')renderStaff();if(name==='cafe')renderCafe();if(name==='monthly')renderMonthly();if(name==='cal')renderCal();
}
function initDefaultStaff(){
  staff=[
    {id:1,name:'中村 伴樹',roles:['K'],defFrom:'09:00',defTo:'22:00',avail:{},maxDays:20},
    {id:2,name:'中村 紀子',roles:['H'],defFrom:'09:00',defTo:'22:00',avail:{},maxDays:20},
    {id:3,name:'牧野 羽詩',roles:['H'],defFrom:'11:00',defTo:'22:00',avail:{},maxDays:20},
    {id:4,name:'住吉 千春',roles:['H','K'],defFrom:'11:00',defTo:'22:00',avail:{},maxDays:20},
    {id:5,name:'前河内 美音',roles:['H'],defFrom:'11:00',defTo:'22:00',avail:{},maxDays:20},
    {id:6,name:'矢富 可那子',roles:['K'],defFrom:'11:00',defTo:'22:00',avail:{},maxDays:20},
    {id:7,name:'石橋 知加子',roles:['H'],defFrom:'11:00',defTo:'22:00',avail:{},maxDays:20},
    {id:8,name:'吉川 悦子',roles:['H'],defFrom:'11:00',defTo:'22:00',avail:{},maxDays:20},
    {id:9,name:'形山 ミカ',roles:['H'],defFrom:'11:00',defTo:'22:00',avail:{},maxDays:20},
  ];nextId=10;
}
const tmr=new Date();tmr.setDate(tmr.getDate()+1);
document.getElementById('noticeDate').value=tmr.toISOString().slice(0,10);
loadLocal();if(!staff.length)initDefaultStaff();updatePasteStaff();renderCal();
</script>
